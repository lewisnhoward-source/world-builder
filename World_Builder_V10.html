// FAMILY RELATIONSHIP HELPERS
// ═══════════════════════════════════════════════════════════
function getDerivedRelationships(entry) {
  const chars = world.entries.characters||[];
  const name = entry.name;
  const result = { children:[], siblings:[], auntsUncles:[], cousins:[], spouses:[] };
  // Spouse: bidirectional
  if(entry.spouse){const sp=chars.find(c=>c.name===entry.spouse);if(sp)result.spouses.push(sp);}
  result.spouses.push(...chars.filter(c=>c.spouse===name&&c.id!==entry.id&&!result.spouses.find(s=>s.id===c.id)));

  // Children: characters who list this entry as father or mother
  result.children = chars.filter(c=>c.id!==entry.id&&(c.father===name||c.mother===name));

  // Siblings: characters who share a father or mother with this entry (or are listed in each other's siblings)
  if(entry.father||entry.mother){
    result.siblings = chars.filter(c=>{
      if(c.id===entry.id)return false;
      if(entry.father&&c.father===entry.father)return true;
      if(entry.mother&&c.mother===entry.mother)return true;
      return false;
    });
  }
  // Also add explicit siblings not caught above
  const explicitSiblings = parseMulti(entry.siblings);
  explicitSiblings.forEach(sn=>{const sc=chars.find(c=>c.name===sn);if(sc&&!result.siblings.find(s=>s.id===sc.id))result.siblings.push(sc);});

  // Aunts/uncles: parents' siblings
  const parentNames=[entry.father,entry.mother].filter(Boolean);
  parentNames.forEach(pn=>{
    const parent=chars.find(c=>c.name===pn);if(!parent)return;
    // parent's siblings
    const pSiblings=getDerivedRelationships(parent).siblings;
    pSiblings.forEach(s=>{if(!result.auntsUncles.find(a=>a.id===s.id))result.auntsUncles.push(s);});
  });

  // Cousins: aunts/uncles' children
  result.auntsUncles.forEach(au=>{
    const auChildren=chars.filter(c=>c.father===au.name||c.mother===au.name);
    auChildren.forEach(c=>{if(c.id!==entry.id&&!result.cousins.find(x=>x.id===c.id))result.cousins.push(c);});
  });

  return result;
}

// ═══════════════════════════════════════════════════════════
// FAMILY TREE RENDERER (for Great House/Family faction pages)
// ═══════════════════════════════════════════════════════════
function renderFamilyTree(wrap, factionEntry) {
  const chars = world.entries.characters||[];
  const members = chars.filter(c=>c.affiliation&&c.affiliation.toLowerCase()===factionEntry.name.toLowerCase());
  if(members.length < 2) return;

  const sec=document.createElement('div');sec.className='family-tree-sec';
  sec.innerHTML=`<h3>🌳 Family Tree</h3>`;
  const treeWrap=document.createElement('div');treeWrap.className='family-tree-wrap';

  const memberNames=new Set(members.map(m=>m.name));

  // ── helpers ──
  function getSpousesOf(m) {
    const spouses = [];
    if (m.spouse) { const s = members.find(x=>x.name===m.spouse); if(s&&!spouses.find(x=>x.id===s.id)) spouses.push(s); }
    members.forEach(c=>{ if(c.id!==m.id && c.spouse===m.name && !spouses.find(x=>x.id===c.id)) spouses.push(c); });
    return spouses;
  }

  // Assign generation depth — spouses inherit the depth of their partner (lowest)
  function getDepth(m, visited=new Set()) {
    if(visited.has(m.id)) return 0; visited.add(m.id);
    const fatherInFamily = m.father&&memberNames.has(m.father);
    const motherInFamily = m.mother&&memberNames.has(m.mother);
    if(!fatherInFamily&&!motherInFamily) return 0;
    let max=0;
    if(fatherInFamily){const f=members.find(x=>x.name===m.father);if(f)max=Math.max(max,getDepth(f,new Set(visited))+1);}
    if(motherInFamily){const mo=members.find(x=>x.name===m.mother);if(mo)max=Math.max(max,getDepth(mo,new Set(visited))+1);}
    return max;
  }

  const depthMap={};let maxDepth=0;
  members.forEach(m=>{const d=getDepth(m);depthMap[m.id]=d;if(d>maxDepth)maxDepth=d;});
  // Spouses share the same depth as their partner
  members.forEach(m=>{
    getSpousesOf(m).forEach(sp=>{
      if(depthMap[sp.id]===undefined||depthMap[sp.id]!==depthMap[m.id]){
        depthMap[sp.id]=depthMap[m.id];
      }
    });
  });

  // Group by depth
  const byGen={};
  for(let d=0;d<=maxDepth;d++) byGen[d]=[];
  members.forEach(m=>{ const d=depthMap[m.id]||0; if(!byGen[d]) byGen[d]=[]; byGen[d].push(m); });

  // Sort each generation by birth year
  for(let d=0;d<=maxDepth;d++){
    byGen[d]=byGen[d]||[];
    byGen[d].sort((a,b)=>(parseInt(a.birthYear)||9999)-(parseInt(b.birthYear)||9999));
  }

  // ── Layout constants ──
  const nodeR=34, nodeW=110, nodeH=110, genGap=90, nodeGap=24, spouseGap=16;
  const totalGens=maxDepth+1;
  const maxInGen=Math.max(1,...Object.values(byGen).map(g=>g.length));
  const svgW=Math.max(600,(maxInGen*(nodeW+nodeGap)));
  const svgH=totalGens*(nodeH+genGap)+20;

  const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('width',svgW);svg.setAttribute('height',svgH);
  svg.setAttribute('viewBox',`0 0 ${svgW} ${svgH}`);
  svg.style.cssText='min-width:'+svgW+'px;display:block';

  // ── Position nodes ──
  // We treat spouse-pairs as a single unit for horizontal spacing
  // Build "slots" per generation: each slot is either a solo node or a couple pair
  const nodePos={};
  const spouseOf={}; // id -> id of primary partner (to skip re-positioning)

  for(let d=0;d<=maxDepth;d++){
    const gen=byGen[d]||[];
    // Identify couples in this generation
    const placed=new Set();
    const slots=[]; // each slot: [person] or [person, spouse]
    gen.forEach(m=>{
      if(placed.has(m.id)) return;
      placed.add(m.id);
      const spouses=getSpousesOf(m).filter(s=>depthMap[s.id]===d&&gen.find(x=>x.id===s.id));
      if(spouses.length){
        const sp=spouses[0];
        placed.add(sp.id);
        spouseOf[sp.id]=m.id;
        slots.push([m,sp]);
      } else {
        slots.push([m]);
      }
    });

    // Total width of all slots
    const slotWidths = slots.map(slot=>slot.length===2 ? nodeW+spouseGap+nodeW : nodeW);
    const totalW = slotWidths.reduce((a,b)=>a+b,0) + (slots.length-1)*nodeGap;
    let curX = (svgW-totalW)/2;
    const y=d*(nodeH+genGap)+nodeH/2+20;

    slots.forEach((slot,si)=>{
      if(slot.length===2){
        const [p1,p2]=slot;
        nodePos[p1.id]={x:curX+nodeW/2, y};
        nodePos[p2.id]={x:curX+nodeW+spouseGap+nodeW/2, y};
      } else {
        nodePos[slot[0].id]={x:curX+nodeW/2, y};
      }
      curX += slotWidths[si]+nodeGap;
    });
  }

  // ── Draw parent→child edges (solid curves) ──
  members.forEach(m=>{
    const pos=nodePos[m.id];if(!pos)return;
    [m.father,m.mother].forEach(parentName=>{
      if(!parentName||!memberNames.has(parentName))return;
      const parent=members.find(p=>p.name===parentName);if(!parent)return;
      const pp=nodePos[parent.id];if(!pp)return;
      // For couples: draw from the midpoint between the couple down to child
      const spousePartner=getSpousesOf(parent).find(sp=>nodePos[sp.id]&&nodePos[sp.id].y===pp.y);
      const fromX = spousePartner ? (pp.x+nodePos[spousePartner.id].x)/2 : pp.x;
      const fromY = pp.y+nodeR+2;
      const midY=(fromY+pos.y-nodeR)/2;
      const line=document.createElementNS('http://www.w3.org/2000/svg','path');
      line.setAttribute('d',`M${fromX},${fromY} C${fromX},${midY} ${pos.x},${midY} ${pos.x},${pos.y-nodeR-2}`);
      line.setAttribute('stroke','#c8c0b0');line.setAttribute('stroke-width','2');line.setAttribute('fill','none');
      svg.appendChild(line);
    });
  });

  // ── Draw spouse dotted lines ──
  members.forEach(m=>{
    if(spouseOf[m.id]) return; // skip secondary — drawn by primary
    const spouses=getSpousesOf(m).filter(s=>nodePos[s.id]&&nodePos[s.id].y===nodePos[m.id]?.y);
    const pos=nodePos[m.id];if(!pos)return;
    spouses.forEach(sp=>{
      const spos=nodePos[sp.id];if(!spos)return;
      // Draw dotted line between the two circle edges
      const x1=Math.min(pos.x,spos.x)+nodeR+2;
      const x2=Math.max(pos.x,spos.x)-nodeR-2;
      const y=pos.y;
      const line=document.createElementNS('http://www.w3.org/2000/svg','line');
      line.setAttribute('x1',x1);line.setAttribute('y1',y);
      line.setAttribute('x2',x2);line.setAttribute('y2',y);
      line.setAttribute('stroke','#a09070');line.setAttribute('stroke-width','2');
      line.setAttribute('stroke-dasharray','5,4');
      svg.appendChild(line);
    });
  });

  // ── Draw nodes ──
  members.forEach(m=>{
    const pos=nodePos[m.id];if(!pos)return;
    const g=document.createElementNS('http://www.w3.org/2000/svg','g');
    g.style.cursor='pointer';
    g.onclick=()=>viewEntry('characters',m.id);

    const clipId='clip_'+m.id.replace(/[^a-z0-9]/gi,'_');
    const defs=document.createElementNS('http://www.w3.org/2000/svg','defs');
    const clip=document.createElementNS('http://www.w3.org/2000/svg','clipPath');
    clip.id=clipId;
    const circle=document.createElementNS('http://www.w3.org/2000/svg','circle');
    circle.setAttribute('cx',pos.x);circle.setAttribute('cy',pos.y);circle.setAttribute('r',nodeR+'');
    clip.appendChild(circle);defs.appendChild(clip);svg.appendChild(defs);

    // Gender-coded colours
    const isFemale = (m.gender||'').toLowerCase() === 'female';
    const isMale = (m.gender||'').toLowerCase() === 'male';
    const nodeFill = isFemale ? '#b84080' : isMale ? '#2d6e45' : '#7a5a8a';
    const nodeStroke = isFemale ? '#e070a8' : isMale ? '#4a9a65' : '#a880c8';
    const isDeceased = m.status === 'Deceased';
    const bg=document.createElementNS('http://www.w3.org/2000/svg','circle');
    bg.setAttribute('cx',pos.x);bg.setAttribute('cy',pos.y);bg.setAttribute('r',nodeR+'');
    bg.setAttribute('fill', isDeceased ? nodeFill+'99' : nodeFill);
    bg.setAttribute('stroke', isDeceased ? nodeStroke+'88' : nodeStroke);
    bg.setAttribute('stroke-width','2.5');
    if (isDeceased) bg.setAttribute('opacity','0.72');
    g.appendChild(bg);

    if(m.image){
      const img=document.createElementNS('http://www.w3.org/2000/svg','image');
      img.setAttribute('href',m.image);img.setAttribute('x',pos.x-nodeR);img.setAttribute('y',pos.y-nodeR);
      img.setAttribute('width',(nodeR*2)+'');img.setAttribute('height',(nodeR*2)+'');
      img.setAttribute('clip-path',`url(#${clipId})`);img.setAttribute('preserveAspectRatio','xMidYMid slice');
      g.appendChild(img);
    } else {
      const txt=document.createElementNS('http://www.w3.org/2000/svg','text');
      txt.setAttribute('x',pos.x);txt.setAttribute('y',pos.y+9);
      txt.setAttribute('text-anchor','middle');txt.setAttribute('font-size','26');
      txt.textContent='👤';g.appendChild(txt);
    }

    const name=m.name.length>14?m.name.slice(0,13)+'…':m.name;
    const nameTxt=document.createElementNS('http://www.w3.org/2000/svg','text');
    nameTxt.setAttribute('x',pos.x);nameTxt.setAttribute('y',pos.y+nodeR+16);
    nameTxt.setAttribute('text-anchor','middle');nameTxt.setAttribute('font-size','12');
    nameTxt.setAttribute('font-family','Lora,Georgia,serif');nameTxt.setAttribute('font-weight','500');
    nameTxt.setAttribute('fill',m.status==='Deceased'?'#9a9090':'#1a1714');
    nameTxt.textContent=name;g.appendChild(nameTxt);

    const age=calcAge(m);
    if(age){
      const ageTxt=document.createElementNS('http://www.w3.org/2000/svg','text');
      ageTxt.setAttribute('x',pos.x);ageTxt.setAttribute('y',pos.y+nodeR+30);
      ageTxt.setAttribute('text-anchor','middle');ageTxt.setAttribute('font-size','10');
      ageTxt.setAttribute('font-family','Lora,Georgia,serif');ageTxt.setAttribute('fill','#8a8070');
      ageTxt.textContent=age;g.appendChild(ageTxt);
    }

    // Deceased diagonal slash (yield-sign style)
    if (isDeceased) {
      const slashAngle = 35; // degrees
      const rad = (slashAngle * Math.PI) / 180;
      const slashLen = nodeR * 1.7;
      const sx = pos.x - Math.cos(rad) * slashLen/2;
      const sy = pos.y - Math.sin(rad) * slashLen/2;
      const ex = pos.x + Math.cos(rad) * slashLen/2;
      const ey = pos.y + Math.sin(rad) * slashLen/2;
      const slash = document.createElementNS('http://www.w3.org/2000/svg','line');
      slash.setAttribute('x1',sx);slash.setAttribute('y1',sy);
      slash.setAttribute('x2',ex);slash.setAttribute('y2',ey);
      slash.setAttribute('stroke','rgba(255,255,255,0.75)');
      slash.setAttribute('stroke-width','5');
      slash.setAttribute('stroke-linecap','round');
      slash.setAttribute('clip-path',`url(#${clipId})`);
      g.appendChild(slash);
    }
    g.onmouseenter=()=>{bg.setAttribute('stroke','#f0d080');bg.setAttribute('stroke-width','3.5');};
    g.onmouseleave=()=>{bg.setAttribute('stroke',nodeStroke+(isDeceased?'88':''));bg.setAttribute('stroke-width','2.5');};

    svg.appendChild(g);
  });

  treeWrap.appendChild(svg);
  sec.appendChild(treeWrap);
  wrap.appendChild(sec);
}

// VIEW ENTRY
// ═══════════════════════════════════════════════════════════
function viewEntry(catId, entryId){
  const cat=CATS.find(c=>c.id===catId);
  const entry=world.entries[catId]?.find(e=>e.id===entryId);
  if(!cat||!entry)return;
  currentView={type:'entry',catId,entryId};renderSidebar();
  const area=document.getElementById('contentArea');area.innerHTML='';
  const wrap=document.createElement('div');wrap.className='ev-wrap';

  const top=document.createElement('div');top.className='ev-top';
  const imgBlock=document.createElement('div');imgBlock.className='ev-img-block';
  if(entry.image){const img=document.createElement('img');img.className='ev-img';img.src=entry.image;img.alt=entry.name;imgBlock.appendChild(img);}
  else{const ph=document.createElement('div');ph.className='ev-img-ph';ph.innerHTML=`<div class="ph-icon">${cat.icon}</div><div class="ph-text">No image</div>`;imgBlock.appendChild(ph);}
  top.appendChild(imgBlock);

  const hdr=document.createElement('div');hdr.className='ev-hdr';
  if(catId==='locations'&&entry.locatedIn){const par=world.entries.locations.find(e=>e.id===entry.locatedIn||e.name===entry.locatedIn);if(par){const bc=document.createElement('div');bc.className='ev-bc';bc.innerHTML=`<a onclick="viewEntry('locations','${par.id}')">📍 ${esc(par.name)}</a> › ${esc(entry.name)}`;hdr.appendChild(bc);}}
  if(catId==='factions'&&entry.parentFaction){const par=world.entries.factions.find(e=>e.id===entry.parentFaction||e.name===entry.parentFaction);if(par){const bc=document.createElement('div');bc.className='ev-bc';bc.innerHTML=`<a onclick="viewEntry('factions','${par.id}')">⚜ ${esc(par.name)}</a> › ${esc(entry.name)}`;hdr.appendChild(bc);}}

  const tag=document.createElement('div');tag.className=`cat-tag ${cat.color}`;tag.textContent=`${cat.icon} ${cat.label}`;hdr.appendChild(tag);
  const h1=document.createElement('h1');h1.className='ev-h1';h1.textContent=entry.name;hdr.appendChild(h1);
  const subVal=entry.title||entry.factionType||entry.type||'';
  if(subVal){const sub=document.createElement('div');sub.className='ev-subtitle';sub.textContent=subVal;hdr.appendChild(sub);}
  const acts=document.createElement('div');acts.className='ev-acts';
  acts.innerHTML=`<button class="btn btn-secondary btn-sm" onclick="deleteEntry('${catId}','${entryId}')">✕ Delete</button><button class="btn btn-primary btn-sm" onclick="editEntry('${catId}','${entryId}')">✎ Edit</button>`;
  hdr.appendChild(acts);top.appendChild(hdr);wrap.appendChild(top);
  wrap.innerHTML+='<hr class="ev-divider">';

  // Fields grid
  const grid=document.createElement('div');grid.className='fields-grid';
  // Derived age
  if(catId==='characters'){
    const age=calcAge(entry);
    if(entry.birthYear){
      const bg=document.createElement('div');bg.className='f-group';
      bg.innerHTML=`<div class="f-lbl">Born</div><div class="f-val">${esc(entry.birthYear)}</div>`;grid.appendChild(bg);
    }
    if(entry.deathYear){
      const dg=document.createElement('div');dg.className='f-group';
      dg.innerHTML=`<div class="f-lbl">Died</div><div class="f-val">${esc(entry.deathYear)}</div>`;grid.appendChild(dg);
    }
    if(age){
      const ag=document.createElement('div');ag.className='f-group';
      ag.innerHTML=`<div class="f-lbl">${entry.deathYear?'Lifespan':'Age'}</div><div class="f-val" style="font-weight:600;color:var(--accent)">${age}</div>`;grid.appendChild(ag);
    }
  }
  if(catId==='history'&&(entry.yearStart||entry.yearEnd)){
    const ys=parseInt(entry.yearStart),ye=parseInt(entry.yearEnd);
    const pg=document.createElement('div');pg.className='f-group';
    pg.innerHTML=`<div class="f-lbl">Period</div><div class="f-val">${esc(entry.yearStart||'?')}${entry.yearEnd&&entry.yearEnd!==entry.yearStart?` – ${esc(entry.yearEnd)}`:''}</div>`;
    grid.appendChild(pg);
    if(!isNaN(ys)&&!isNaN(ye)&&ye>ys){
      const dg=document.createElement('div');dg.className='f-group';
      dg.innerHTML=`<div class="f-lbl">Duration</div><div class="f-val" style="font-weight:600;color:var(--accent)">${ye-ys} years</div>`;grid.appendChild(dg);
    }
  }

  // Family fields: skip from grid — handle separately below
  const familyFieldIds=new Set(['father','mother','children','siblings','auntsUncles','cousins']);

  cat.fields.forEach(f=>{
    if(catId==='characters'&&(f.id==='birthYear'||f.id==='deathYear'))return;
    if(catId==='history'&&(f.id==='yearStart'||f.id==='yearEnd'))return;
    if(catId==='characters'&&familyFieldIds.has(f.id))return;

    const val=entry[f.id];
    // Handle ac fields that link to entries
    if(f.type==='ac'&&f.acSrc&&val){
      const srcs=f.acSrc.split(',');
      let linked=null;
      for(const src of srcs){
        const found=(world.entries[src.trim()]||[]).find(e=>e.name===val||e.id===val);
        if(found){linked={entry:found,catId:src.trim()};break;}
      }
      const grp=document.createElement('div');grp.className='f-group'+(f.sz===3?' fg-s3':f.sz===2?' fg-s2':'');
      const lbl=document.createElement('div');lbl.className='f-lbl';lbl.textContent=f.label;
      const vDiv=document.createElement('div');vDiv.className='f-val';
      if(linked)vDiv.innerHTML=`<a onclick="viewEntry('${linked.catId}','${linked.entry.id}')">${esc(val)}</a>`;
      else vDiv.innerHTML=autoLink(esc(val));
      grp.appendChild(lbl);grp.appendChild(vDiv);grid.appendChild(grp);return;
    }
    if(f.type==='multi-ac'){
      const vals=parseMulti(val);if(!vals.length)return;
      const grp=document.createElement('div');grp.className='f-group'+(f.sz===3?' fg-s3':f.sz===2?' fg-s2':'');
      const lbl=document.createElement('div');lbl.className='f-lbl';lbl.textContent=f.label;
      const vDiv=document.createElement('div');vDiv.className='f-val';
      vDiv.innerHTML=vals.map(v=>{
        const found=(world.entries[f.acSrc]||[]).find(e=>e.name===v);
        return found?`<a onclick="viewEntry('${f.acSrc}','${found.id}')">${esc(v)}</a>`:esc(v);
      }).join(', ');
      grp.appendChild(lbl);grp.appendChild(vDiv);grid.appendChild(grp);return;
    }
    if(!val&&f.type!=='select')return;
    const grp=document.createElement('div');grp.className='f-group'+(f.sz===3?' fg-s3':f.sz===2?' fg-s2':'');
    const lbl=document.createElement('div');lbl.className='f-lbl';lbl.textContent=f.label;
    const vDiv=document.createElement('div');vDiv.className='f-val';vDiv.innerHTML=val?autoLink(esc(val)):'—';
    grp.appendChild(lbl);grp.appendChild(vDiv);grid.appendChild(grp);
  });
  wrap.appendChild(grid);

  // ── FAMILY SECTION for characters ──
  if(catId==='characters'){
    const rels=getDerivedRelationships(entry);
    const chars=world.entries.characters||[];
    const fatherEntry=entry.father?chars.find(c=>c.name===entry.father):null;
    const motherEntry=entry.mother?chars.find(c=>c.name===entry.mother):null;

    const famEntries=[
      {label:'Father',list:fatherEntry?[fatherEntry]:[]},
      {label:'Mother',list:motherEntry?[motherEntry]:[]},
      {label:'Spouse',list:rels.spouses||[]},
      {label:'Children',list:rels.children},
      {label:'Siblings',list:rels.siblings},
      {label:'Aunts & Uncles',list:rels.auntsUncles},
      {label:'Cousins',list:rels.cousins},
    ].filter(g=>g.list.length>0);

    if(famEntries.length){
      const fsec=document.createElement('div');fsec.className='family-sec';
      fsec.innerHTML=`<h3>Family</h3>`;
      famEntries.forEach(g=>{
        const subHdr=document.createElement('div');
        subHdr.style.cssText='font-family:\'Lora\',serif;font-size:12px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:8px;margin-top:14px';
        subHdr.textContent=g.label;fsec.appendChild(subHdr);
        const fgrid=document.createElement('div');fgrid.className='family-grid';
        g.list.forEach(m=>{
          const card=document.createElement('div');card.className='family-card';card.onclick=()=>viewEntry('characters',m.id);
          const img=document.createElement('div');img.className='fc-img';
          if(m.image){const i=document.createElement('img');i.src=m.image;img.appendChild(i);}else img.textContent='👤';
          const inf=document.createElement('div');
          const age=calcAge(m);
          inf.innerHTML=`<div class="fc-name">${esc(m.name)}</div><div class="fc-rel">${age||esc(m.status||'')}</div>`;
          card.appendChild(img);card.appendChild(inf);fgrid.appendChild(card);
        });
        fsec.appendChild(fgrid);
      });
      wrap.appendChild(fsec);
    }
  }

  // ── FACTION DERIVED SECTIONS ──
  if(catId==='factions'){
    // Family Members
    const members=(world.entries.characters||[]).filter(c=>c.affiliation&&c.affiliation.toLowerCase()===entry.name.toLowerCase());
    if(members.length){
      const sec=document.createElement('div');sec.className='derived-sec';
      sec.innerHTML=`<h3>Members <span class="count">${members.length}</span></h3>`;
      const g=document.createElement('div');g.className='members-grid';
      members.forEach(m=>{
        const card=document.createElement('div');card.className='member-card';card.onclick=()=>viewEntry('characters',m.id);
        const img=document.createElement('div');img.className='mc-img';
        if(m.image){const i=document.createElement('img');i.src=m.image;img.appendChild(i);}else img.textContent='👤';
        const age=calcAge(m);
        const inf=document.createElement('div');inf.innerHTML=`<div class="mc-name">${esc(m.name)}</div><div class="mc-sub">${esc(m.title||'')}${age?' · '+age:''}</div>`;
        card.appendChild(img);card.appendChild(inf);g.appendChild(card);
      });
      sec.appendChild(g);wrap.appendChild(sec);
    }
    // Family tree for Great House / Family
    if(entry.factionType==='Great House'||entry.factionType==='Family / Sub-House') renderFamilyTree(wrap,entry);
    // Controlled locations
    const controlled=(world.entries.locations||[]).filter(l=>l.ruler&&l.ruler.toLowerCase().includes(entry.name.toLowerCase()));
    if(controlled.length){
      const sec=document.createElement('div');sec.className='derived-sec';
      sec.innerHTML=`<h3>Controlled Locations <span class="count">${controlled.length}</span></h3>`;
      const g=document.createElement('div');g.className='members-grid';
      controlled.forEach(l=>{
        const card=document.createElement('div');card.className='member-card';card.onclick=()=>viewEntry('locations',l.id);
        const img=document.createElement('div');img.className='mc-img';
        if(l.image){const i=document.createElement('img');i.src=l.image;img.appendChild(i);}else img.textContent='🗺';
        const inf=document.createElement('div');inf.innerHTML=`<div class="mc-name">${esc(l.name)}</div><div class="mc-sub">${esc(l.type||'')}</div>`;
        card.appendChild(img);card.appendChild(inf);g.appendChild(card);
      });
      sec.appendChild(g);wrap.appendChild(sec);
    }
    // Owing allegiance
    const vassals=(world.entries.factions||[]).filter(f=>{
      if(!f.parentFaction)return false;
      const pf=f.parentFaction;
      return pf===entryId||pf===entry.name||(world.entries.factions.find(x=>x.id===pf)?.name===entry.name);
    });
    if(vassals.length){
      const sec=document.createElement('div');sec.className='derived-sec';
      sec.innerHTML=`<h3>Owing Allegiance <span class="count">${vassals.length}</span></h3>`;
      const g=document.createElement('div');g.className='members-grid';
      vassals.forEach(v=>{
        const card=document.createElement('div');card.className='member-card';card.onclick=()=>viewEntry('factions',v.id);
        const img=document.createElement('div');img.className='mc-img';
        if(v.image){const i=document.createElement('img');i.src=v.image;img.appendChild(i);}else img.textContent='⚜';
        const inf=document.createElement('div');inf.innerHTML=`<div class="mc-name">${esc(v.name)}</div><div class="mc-sub">${esc(v.factionType||'')}</div>`;
        card.appendChild(img);card.appendChild(inf);g.appendChild(card);
      });
      sec.appendChild(g);wrap.appendChild(sec);
    }
  }

  // ── HISTORY: Conflict opposing forces ──
  if(catId==='history' && entry.type && (entry.type.toLowerCase()==='conflict'||entry.type.toLowerCase()==='war') && (entry.sideA||entry.sideB)){
    const sec=document.createElement('div');sec.className='derived-sec';
    sec.innerHTML=`<h3>⚔ Opposing Forces</h3>`;
    const sidesDiv=document.createElement('div');sidesDiv.className='conflict-sides';
    const sideADiv=document.createElement('div');sideADiv.className='conflict-side-a';
    sideADiv.innerHTML=`<div class="conflict-side-label">⚔ Side A</div>`;
    if(entry.sideA){entry.sideA.split(',').forEach(f=>{
      const name=f.trim();if(!name)return;
      const fEntry=(world.entries.factions||[]).find(x=>x.name.toLowerCase()===name.toLowerCase());
      const pill=document.createElement('div');
      pill.style.cssText='display:inline-flex;align-items:center;gap:6px;background:rgba(192,64,64,0.1);border:1px solid rgba(192,64,64,0.3);border-radius:20px;padding:4px 12px;margin:3px 3px 3px 0;font-size:14px;cursor:'+(fEntry?'pointer':'default');
      pill.textContent=name;
      if(fEntry)pill.onclick=()=>viewEntry('factions',fEntry.id);
      sideADiv.appendChild(pill);
    });}
    const sideBDiv=document.createElement('div');sideBDiv.className='conflict-side-b';
    sideBDiv.innerHTML=`<div class="conflict-side-label">⚔ Side B</div>`;
    if(entry.sideB){entry.sideB.split(',').forEach(f=>{
      const name=f.trim();if(!name)return;
      const fEntry=(world.entries.factions||[]).find(x=>x.name.toLowerCase()===name.toLowerCase());
      const pill=document.createElement('div');
      pill.style.cssText='display:inline-flex;align-items:center;gap:6px;background:rgba(58,90,138,0.1);border:1px solid rgba(58,90,138,0.3);border-radius:20px;padding:4px 12px;margin:3px 3px 3px 0;font-size:14px;cursor:'+(fEntry?'pointer':'default');
      pill.textContent=name;
      if(fEntry)pill.onclick=()=>viewEntry('factions',fEntry.id);
      sideBDiv.appendChild(pill);
    });}
    sidesDiv.appendChild(sideADiv);sidesDiv.appendChild(sideBDiv);
    sec.appendChild(sidesDiv);wrap.appendChild(sec);
  }

  // ── LOCATION: child locations grouped by type ──
  if(catId==='locations'){
    const kids=(world.entries.locations||[]).filter(e=>e.locatedIn===entryId||e.locatedIn===entry.name);
    if(kids.length){
      // Group children by type
      const typeOrder=['Continent','Region','Country','City','Town','Village','Dungeon','Wilderness','Landmark','Plane','Other'];
      const byType={};
      kids.forEach(k=>{ const t=k.type||'Other'; if(!byType[t]) byType[t]=[]; byType[t].push(k); });
      const usedTypes=typeOrder.filter(t=>byType[t]&&byType[t].length>0);
      const container=document.createElement('div');
      usedTypes.forEach(type=>{
        const group=byType[type];
        const sec=document.createElement('div');sec.className='subloc-type-section';
        const hdr=document.createElement('div');hdr.className='subloc-type-hdr';
        hdr.innerHTML=`${type}s <span class="count">${group.length}</span>`;
        sec.appendChild(hdr);
        const cg=document.createElement('div');cg.className='children-grid';
        group.sort((a,b)=>a.name.localeCompare(b.name)).forEach(k=>{
          const card=document.createElement('div');card.className='child-card';card.onclick=()=>viewEntry('locations',k.id);
          const img=document.createElement('div');img.className='child-card-img';
          if(k.image){const i=document.createElement('img');i.src=k.image;i.style='width:100%;height:100%;object-fit:cover;border-radius:6px';img.appendChild(i);}else img.textContent='📍';
          const inf=document.createElement('div');inf.innerHTML=`<div class="child-card-name">${esc(k.name)}</div><div class="child-card-type">${esc(k.type||'')}</div>`;
          card.appendChild(img);card.appendChild(inf);cg.appendChild(card);
        });
        sec.appendChild(cg);container.appendChild(sec);
      });
      wrap.appendChild(container);
    }
  }

  // Referenced by
  const refs=findMentions(entry.name,catId,entryId);
  if(refs.length){
    const rs=document.createElement('div');rs.className='ref-sec';
    rs.innerHTML=`<h4>Referenced in ${refs.length} other ${refs.length===1?'entry':'entries'}</h4>`;
    const chips=document.createElement('div');chips.className='ref-chips';
    refs.forEach(m=>{const c=document.createElement('div');c.className='ref-chip';c.textContent=m.name;c.onclick=()=>viewEntry(m.catId,m.id);chips.appendChild(c);});
    rs.appendChild(chips);wrap.appendChild(rs);
  }

  area.appendChild(wrap);
}

// ═══════════════════════════════════════════════════════════
// FORM
// ═══════════════════════════════════════════════════════════
function newEntry(catId, parentId){
  const cat=CATS.find(c=>c.id===catId);if(!cat)return;
  currentView={type:'form',catId};editImageData=null;
  renderForm(cat,null,parentId||null);
}
function editEntry(catId, entryId){
  const cat=CATS.find(c=>c.id===catId);
  const entry=world.entries[catId]?.find(e=>e.id===entryId);
  if(!cat||!entry){showToast('Entry not found');return;}
  currentView={type:'form',catId,entryId};editImageData=entry.image||null;
  renderForm(cat,entry,null);
}

function renderForm(cat, entry, parentId) {
  const isNew = !entry;
  const area = document.getElementById('contentArea'); area.innerHTML = '';
  const wrap = document.createElement('div'); wrap.className = 'ef-wrap';

  // ── STICKY TOOLBAR ──
  const toolbar = document.createElement('div'); toolbar.className = 'form-sticky-bar';
  const titleSpan = document.createElement('div'); titleSpan.className = 'form-title';
  titleSpan.innerHTML = `<span class="cat-tag ${cat.color}" style="margin:0">${cat.icon} ${cat.label}</span><span>${isNew ? 'New Entry' : 'Edit Entry'}</span>`;
  toolbar.appendChild(titleSpan);
  const cBtn = document.createElement('button'); cBtn.className = 'btn btn-ghost'; cBtn.textContent = 'Cancel';
  cBtn.onclick = () => { if (entry) viewEntry(cat.id, entry.id); else if (currentView?.catId) showCatLanding(currentView.catId); else showLanding(); };
  const sBtn = document.createElement('button'); sBtn.className = 'btn btn-primary';
  sBtn.textContent = isNew ? '✦ Create Entry' : '✦ Save Changes';
  sBtn.onclick = () => saveEntry(cat.id, entry?.id || null);
  toolbar.appendChild(cBtn); toolbar.appendChild(sBtn);
  wrap.appendChild(toolbar);

  if (cat.id === 'characters') {
    renderCharacterForm(wrap, entry, isNew);
  } else {
    renderGenericForm(wrap, cat, entry, parentId);
  }
  area.appendChild(wrap);
}

function renderCharacterForm(wrap, entry, isNew) {
  const e = entry || {};
  // Image + name row
  const topGrid = document.createElement('div'); topGrid.className = 'char-form-top';

  // Image block
  const ib = document.createElement('div'); ib.className = 'ef-img-block';
  const upDiv = document.createElement('div'); upDiv.className = 'ef-img-up'; upDiv.id = 'fImgPrev';
  upDiv.onclick = () => document.getElementById('imgInput').click();
  if (editImageData) upDiv.innerHTML = `<img src="${editImageData}"><div class="img-ov">📷 Change</div>`;
  else upDiv.innerHTML = `<div class="up-ph"><div class="big-icon">👤</div><div>Click to add image</div></div>`;
  ib.appendChild(upDiv);
  const rmBtn = document.createElement('button'); rmBtn.className = 'btn btn-ghost btn-sm';
  rmBtn.style.cssText = 'width:100%;margin-top:8px;justify-content:center;font-size:12px';
  rmBtn.textContent = '✕ Remove image';
  rmBtn.onclick = () => { editImageData = null; upDiv.innerHTML = `<div class="up-ph"><div class="big-icon">👤</div><div>Click to add image</div></div>`; };
  ib.appendChild(rmBtn); topGrid.appendChild(ib);

  // Right side
  const mainDiv = document.createElement('div'); mainDiv.className = 'char-fields-main';

  // Name
  const nameDiv = document.createElement('div'); nameDiv.className = 'ef-name';
  const nameInp = document.createElement('input'); nameInp.className = 'ef-name-input'; nameInp.id = 'field_name';
  nameInp.type = 'text'; nameInp.placeholder = 'Character name…'; nameInp.value = e.name || '';
  if (isNew) setTimeout(() => nameInp.focus(), 50);
  nameDiv.appendChild(nameInp); mainDiv.appendChild(nameDiv);

  // Row 1: Faction, Race
  const row1 = document.createElement('div'); row1.className = 'char-row char-row-2';
  row1.appendChild(makeFormGroup('Faction / Affiliation', makeACField({ph:'e.g. House Valeron…',acSrc:'factions'}, e.affiliation||'', 'field_affiliation')));
  row1.appendChild(makeFormGroup('Race', makeACField({ph:'e.g. Human…',acSrc:'races',defaultVal:'Human'}, e.race||'', 'field_race')));
  mainDiv.appendChild(row1);

  // Row 2: Title, Status
  const row2 = document.createElement('div'); row2.className = 'char-row char-row-2';
  row2.appendChild(makeFormGroup('Title / Role', makeTextInput('field_title', e.title||'', 'e.g. Empress, High Mage…')));
  row2.appendChild(makeFormGroup('Status', makeSelectInput('field_status', ['Alive','Deceased','Missing','Unknown','Undead'], e.status||'Alive')));
  mainDiv.appendChild(row2);

  // Row 3: Birth, Death, Age (calculated)
  const row3 = document.createElement('div'); row3.className = 'char-row char-row-3';
  const birthGrp = makeFormGroup('Year of Birth', makeTextInput('field_birthYear', e.birthYear||'', 'e.g. 842…'));
  const deathGrp = makeFormGroup('Year of Death', makeTextInput('field_deathYear', e.deathYear||'', 'Leave blank if living…'));
  const ageDiv = document.createElement('div'); ageDiv.id = 'field_age_display';
  ageDiv.className = 'age-display empty'; ageDiv.textContent = 'Age';
  const ageGrp = makeFormGroup('Age', ageDiv);
  row3.appendChild(birthGrp); row3.appendChild(deathGrp); row3.appendChild(ageGrp);
  mainDiv.appendChild(row3);

  // Wire up live age calculation
  function updateAge() {
    const b = parseInt(document.getElementById('field_birthYear')?.value);
    const d = parseInt(document.getElementById('field_deathYear')?.value);
    const cy = parseInt(world.currentYear);
    const el = document.getElementById('field_age_display');
    if (!el) return;
    if (isNaN(b)) { el.textContent = 'Age'; el.className = 'age-display empty'; return; }
    if (!isNaN(d)) { el.textContent = (d - b) + ' yrs'; el.className = 'age-display'; return; }
    if (!isNaN(cy)) { el.textContent = (cy - b) + ' yrs'; el.className = 'age-display'; return; }
    el.textContent = 'Age'; el.className = 'age-display empty';
  }
  setTimeout(() => {
    document.getElementById('field_birthYear')?.addEventListener('input', updateAge);
    document.getElementById('field_deathYear')?.addEventListener('input', updateAge);
    updateAge();
  }, 50);

  topGrid.appendChild(mainDiv); wrap.appendChild(topGrid);

  // FAMILY section
  const famSec = document.createElement('div'); famSec.className = 'char-family-section';
  const famTitle = document.createElement('div'); famTitle.className = 'char-family-title'; famTitle.textContent = 'Family';
  famSec.appendChild(famTitle);

  // Father, Mother, Spouse
  const famRow1 = document.createElement('div'); famRow1.className = 'char-row char-row-3';
  famRow1.appendChild(makeFormGroup('Father', makeACField({ph:'Father name…',acSrc:'characters'}, e.father||'', 'field_father')));
  famRow1.appendChild(makeFormGroup('Mother', makeACField({ph:'Mother name…',acSrc:'characters'}, e.mother||'', 'field_mother')));
  famRow1.appendChild(makeFormGroup('Spouse', makeACField({ph:'Spouse name…',acSrc:'characters'}, e.spouse||'', 'field_spouse')));
  famSec.appendChild(famRow1);

  // Children, Siblings, Aunts & Uncles, Cousins
  const famRow2 = document.createElement('div'); famRow2.className = 'char-row char-row-4';
  famRow2.appendChild(makeFormGroup('Children', makeMultiACField({ph:'Add a child…',acSrc:'characters'}, parseMulti(e.children||''), 'field_children')));
  famRow2.appendChild(makeFormGroup('Siblings', makeMultiACField({ph:'Add a sibling…',acSrc:'characters'}, parseMulti(e.siblings||''), 'field_siblings')));
  famRow2.appendChild(makeFormGroup('Aunts & Uncles', makeMultiACField({ph:'Add aunt/uncle…',acSrc:'characters'}, parseMulti(e.auntsUncles||''), 'field_auntsUncles')));
  famRow2.appendChild(makeFormGroup('Cousins', makeMultiACField({ph:'Add a cousin…',acSrc:'characters'}, parseMulti(e.cousins||''), 'field_cousins')));
  famSec.appendChild(famRow2);
  wrap.appendChild(famSec);

  // Divider + remaining fields
  const div = document.createElement('hr'); div.style.cssText = 'border:none;border-top:1.5px solid var(--border);margin:24px 0';
  wrap.appendChild(div);

  // Current Location (single row below family)
  const locRow = document.createElement('div'); locRow.className = 'char-row char-row-3';
  locRow.appendChild(makeFormGroup('Current Location', makeACField({ph:'e.g. Vaelthorn City…',acSrc:'locations'}, e.location||'', 'field_location')));
  wrap.appendChild(locRow);

  // Text areas
  const textFields = ['appearance','personality','background','notes'];
  const textLabels = ['Appearance','Personality & Traits','Background','Notes & Secrets'];
  const textPhs = ['Physical description…','How they think, speak, act…','History and origins…','DM notes, hidden details…'];
  textFields.forEach((fid, i) => {
    const grp = makeFormGroup(textLabels[i], makeTextarea('field_'+fid, e[fid]||'', textPhs[i]));
    grp.style.marginTop = '16px';
    wrap.appendChild(grp);
  });
}

function renderGenericForm(wrap, cat, entry, parentId) {
  const e = entry || {};
  const top = document.createElement('div'); top.className = 'ef-top';
  const ib = document.createElement('div'); ib.className = 'ef-img-block';
  const upDiv = document.createElement('div'); upDiv.className = 'ef-img-up'; upDiv.id = 'fImgPrev';
  upDiv.onclick = () => document.getElementById('imgInput').click();
  if (editImageData) upDiv.innerHTML = `<img src="${editImageData}"><div class="img-ov">📷 Change</div>`;
  else upDiv.innerHTML = `<div class="up-ph"><div class="big-icon">${cat.icon}</div><div>Click to add image</div></div>`;
  ib.appendChild(upDiv);
  const rmBtn = document.createElement('button'); rmBtn.className = 'btn btn-ghost btn-sm';
  rmBtn.style.cssText = 'width:100%;margin-top:8px;justify-content:center;font-size:12px';
  rmBtn.textContent = '✕ Remove image';
  rmBtn.onclick = () => { editImageData = null; upDiv.innerHTML = `<div class="up-ph"><div class="big-icon">${cat.icon}</div><div>Click to add image</div></div>`; };
  ib.appendChild(rmBtn); top.appendChild(ib);

  const main = document.createElement('div'); main.className = 'ef-main';
  const nameDiv = document.createElement('div'); nameDiv.className = 'ef-name';
  const nameInp = document.createElement('input'); nameInp.className = 'ef-name-input'; nameInp.id = 'field_name';
  nameInp.type = 'text'; nameInp.placeholder = 'Entry name…'; nameInp.value = e.name || '';
  if (!entry) setTimeout(() => nameInp.focus(), 50);
  nameDiv.appendChild(nameInp); main.appendChild(nameDiv);
  top.appendChild(main); wrap.appendChild(top);

  const grid = document.createElement('div'); grid.className = 'form-grid';
  cat.fields.forEach(f => {
    const grp = document.createElement('div'); grp.className = 'form-group' + (f.sz===3?' fg3':f.sz===2?' fg2':'');
    const lbl = document.createElement('label'); lbl.className = 'form-label'; lbl.textContent = f.label; lbl.htmlFor = `field_${f.id}`;
    grp.appendChild(lbl);
    if (f.type === 'area') { grp.appendChild(makeTextarea(`field_${f.id}`, e[f.id]||'', f.ph||'')); }
    else if (f.type === 'select') { grp.appendChild(makeSelectInput(`field_${f.id}`, f.opts, e[f.id]||'')); }
    else if (f.type === 'ac') {
      const currentVal = e[f.id]||'';
      let sel = null;
      if (f.id === 'locatedIn') sel = buildLocSelectForField(e?.id, currentVal, parentId);
      else if (f.id === 'parentFaction') sel = buildFactSelectForField(e?.id, currentVal, parentId);
      else sel = makeACField(f, currentVal, `field_${f.id}`);
      grp.appendChild(sel);
    }
    else if (f.type === 'multi-ac') { grp.appendChild(makeMultiACField(f, parseMulti(e[f.id]||''), `field_${f.id}`)); }
    else { grp.appendChild(makeTextInput(`field_${f.id}`, e[f.id]||f.defaultVal||'', f.ph||'')); }
    grid.appendChild(grp);
  });
  wrap.appendChild(grid);
}

// Helper form element builders
function makeFormGroup(label, inputEl) {
  const grp = document.createElement('div'); grp.className = 'form-group';

// Fields in characters that store other character names by string
const CHAR_REL_FIELDS = ['father','mother','spouse','children','siblings','auntsUncles','cousins'];

function cascadeRename(oldName, newName) {
  if (!oldName || !newName || oldName === newName) return 0;
  let count = 0;
  (world.entries.characters || []).forEach(ch => {
    CHAR_REL_FIELDS.forEach(field => {
      if (!ch[field]) return;
      // Handle both plain string fields and JSON array fields
      if (ch[field] === oldName) { ch[field] = newName; count++; }
      else if (ch[field].startsWith('[')) {
        try {
          const arr = JSON.parse(ch[field]);
          const updated = arr.map(v => v === oldName ? newName : v);
          if (JSON.stringify(arr) !== JSON.stringify(updated)) { ch[field] = JSON.stringify(updated); count++; }
        } catch(e) {}
      }
    });
  });
  return count;
}

function saveEntry(catId, entryId){
  const name=document.getElementById('field_name')?.value?.trim();
  if(!name){showToast('Entry needs a name.');return;}
  const cat=CATS.find(c=>c.id===catId);
  const isNew=!entryId;
  const id=entryId||('e_'+Date.now()+'_'+Math.random().toString(36).slice(2,6));

  // Capture old name for cascade rename
  const oldEntry = !isNew ? world.entries[catId]?.find(e=>e.id===entryId) : null;
  const oldName = oldEntry?.name || '';

  const entry={id,name};
  if(editImageData)entry.image=editImageData;
  else if(oldEntry?.image && !editImageData && editImageData !== null) entry.image = oldEntry.image;
  cat.fields.forEach(f=>{
    if(f.type==='multi-ac'){
      const hidden=document.getElementById(`field_${f.id}_val`);
      if(hidden)entry[f.id]=hidden.value||'[]';
    } else {
      const el=document.getElementById(`field_${f.id}`);
      if(el)entry[f.id]=el.value||'';
    }
  });
  if(isNew)world.entries[catId].push(entry);
  else{const idx=world.entries[catId].findIndex(e=>e.id===entryId);if(idx>=0)world.entries[catId][idx]=entry;}
  if(catId==='locations'&&entry.locatedIn)expandedLocs.add(entry.locatedIn);
  if(catId==='factions'&&entry.parentFaction)expandedFacts.add(entry.parentFaction);

  // Cascade rename for characters
  let renamed = 0;
  if (catId === 'characters' && !isNew && oldName && oldName !== name) {
    renamed = cascadeRename(oldName, name);
  }

  const msg = renamed > 0
    ? `${name} saved! Updated ${renamed} reference${renamed===1?'':'s'}.`
    : (isNew ? `${name} created!` : `${name} saved!`);
  showToast(msg, true);
  markDirty();
  viewEntry(catId,id);
}

function deleteEntry(catId, entryId){
  const entry=world.entries[catId]?.find(e=>e.id===entryId);if(!entry)return;
  const kids=catId==='locations'?world.entries.locations.filter(e=>e.locatedIn===entryId||e.locatedIn===entry.name):catId==='factions'?world.entries.factions.filter(e=>e.parentFaction===entryId||e.parentFaction===entry.name):[];
  showModal(`Delete "${entry.name}"?`,`This cannot be undone.${kids.length?` ${kids.length} child entr${kids.length===1?'y':'ies'} will also be affected.`:''}`,null,[
    {label:'Cancel',cls:'btn-ghost',action:closeModal},
    {label:'✕ Delete',cls:'btn-danger',action:()=>{
      world.entries[catId]=world.entries[catId].filter(e=>e.id!==entryId);
      if(catId==='locations')world.entries.locations.forEach(e=>{if(e.locatedIn===entryId||e.locatedIn===entry.name)e.locatedIn='';});
      if(catId==='factions')world.entries.factions.forEach(e=>{if(e.parentFaction===entryId||e.parentFaction===entry.name)e.parentFaction='';});
      currentView=null;closeModal();renderSidebar();showLanding();showToast(`${entry.name} deleted.`);markDirty();
    }}
  ]);
}

let imgEditorSrc = null;
let imgEditorX = 0, imgEditorY = 0, imgEditorScale = 1;
let imgEditorDragging = false, imgEditorDragStartX = 0, imgEditorDragStartY = 0;
let imgEditorOrigX = 0, imgEditorOrigY = 0;
const IMG_CROP_W = 480, IMG_CROP_H = 320; // stage size

document.getElementById('imgInput').addEventListener('change', function(e) {

function openImageEditor(src) {
  imgEditorSrc = src;
  imgEditorX = 0; imgEditorY = 0; imgEditorScale = 1;
  // Remove existing
  document.getElementById('imgEditorOverlay')?.remove();
  const overlay = document.createElement('div'); overlay.className = 'img-editor-overlay'; overlay.id = 'imgEditorOverlay';
  overlay.innerHTML = `
    <div class="img-editor-modal">
      <div class="img-editor-header">
        <h3>🖼 Edit Image</h3>
        <button class="btn btn-ghost btn-sm" onclick="document.getElementById('imgEditorOverlay').remove()">✕</button>
      </div>
      <div class="img-editor-stage" id="imgEditorStage">
        <img id="imgEditorImg" src="${src}" draggable="false">
      </div>
      <div class="img-editor-controls">
        <div class="img-zoom-row">
          <span>🔍</span>
          <input type="range" id="imgZoomSlider" min="10" max="300" value="100" oninput="imgEditorZoom(this.value)">
          <span id="imgZoomLabel">100%</span>
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-secondary btn-sm" onclick="imgEditorFit()">⊡ Fit</button>
          <button class="btn btn-secondary btn-sm" onclick="imgEditorFill()">⊠ Fill</button>
          <button class="btn btn-secondary btn-sm" onclick="imgEditorCenter()">⊕ Center</button>
        </div>
      </div>
      <div class="img-editor-actions">
        <button class="btn btn-ghost btn-sm" onclick="document.getElementById('imgEditorOverlay').remove()">Cancel</button>
        <button class="btn btn-primary btn-sm" onclick="imgEditorCrop()">✓ Apply Crop</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);

  // Wait for image to load then set up
  const img = document.getElementById('imgEditorImg');
  img.onload = () => { imgEditorFill(); setupImgEditorDrag(); };
  if (img.complete) { imgEditorFill(); setupImgEditorDrag(); }
}

function imgEditorApplyTransform() {
  const img = document.getElementById('imgEditorImg'); if (!img) return;
  img.style.transform = `translate(${imgEditorX}px, ${imgEditorY}px) scale(${imgEditorScale})`;
  img.style.width = img.naturalWidth + 'px';
  img.style.height = img.naturalHeight + 'px';
}

function imgEditorZoom(val) {
  const stage = document.getElementById('imgEditorStage'); if (!stage) return;
  const stageW = stage.offsetWidth, stageH = stage.offsetHeight;
  const oldScale = imgEditorScale;
  imgEditorScale = parseFloat(val) / 100;
  // Zoom toward center
  const cx = stageW / 2, cy = stageH / 2;
  imgEditorX = cx - (cx - imgEditorX) * (imgEditorScale / oldScale);
  imgEditorY = cy - (cy - imgEditorY) * (imgEditorScale / oldScale);
  document.getElementById('imgZoomLabel').textContent = Math.round(imgEditorScale * 100) + '%';
  imgEditorApplyTransform();
}

function imgEditorFit() {
  const img = document.getElementById('imgEditorImg'); if (!img) return;
  const stage = document.getElementById('imgEditorStage'); if (!stage) return;
  const sw = stage.offsetWidth, sh = stage.offsetHeight;
  const scale = Math.min(sw / img.naturalWidth, sh / img.naturalHeight);
  imgEditorScale = scale;
  imgEditorX = (sw - img.naturalWidth * scale) / 2;
  imgEditorY = (sh - img.naturalHeight * scale) / 2;
  const slider = document.getElementById('imgZoomSlider');
  if (slider) { slider.value = Math.round(scale * 100); document.getElementById('imgZoomLabel').textContent = Math.round(scale * 100) + '%'; }
  imgEditorApplyTransform();
}

function imgEditorFill() {
  const img = document.getElementById('imgEditorImg'); if (!img) return;
  const stage = document.getElementById('imgEditorStage'); if (!stage) return;
  const sw = stage.offsetWidth, sh = stage.offsetHeight;
  const scale = Math.max(sw / img.naturalWidth, sh / img.naturalHeight);
  imgEditorScale = scale;
  imgEditorX = (sw - img.naturalWidth * scale) / 2;
  imgEditorY = (sh - img.naturalHeight * scale) / 2;
  const slider = document.getElementById('imgZoomSlider');
  if (slider) { slider.value = Math.round(scale * 100); document.getElementById('imgZoomLabel').textContent = Math.round(scale * 100) + '%'; }
  imgEditorApplyTransform();
}

function imgEditorCenter() {
  const img = document.getElementById('imgEditorImg'); if (!img) return;
  const stage = document.getElementById('imgEditorStage'); if (!stage) return;
  const sw = stage.offsetWidth, sh = stage.offsetHeight;
  imgEditorX = (sw - img.naturalWidth * imgEditorScale) / 2;
  imgEditorY = (sh - img.naturalHeight * imgEditorScale) / 2;
  imgEditorApplyTransform();
}

function setupImgEditorDrag() {
  const stage = document.getElementById('imgEditorStage'); if (!stage) return;
  stage.onmousedown = (ev) => {
    imgEditorDragging = true; stage.classList.add('dragging');
    imgEditorDragStartX = ev.clientX; imgEditorDragStartY = ev.clientY;
    imgEditorOrigX = imgEditorX; imgEditorOrigY = imgEditorY;
    ev.preventDefault();
  };
  window.addEventListener('mousemove', imgEditorMouseMove);
  window.addEventListener('mouseup', imgEditorMouseUp);
  // Touch
  stage.ontouchstart = (ev) => {
    const t = ev.touches[0];
    imgEditorDragging = true;
    imgEditorDragStartX = t.clientX; imgEditorDragStartY = t.clientY;
    imgEditorOrigX = imgEditorX; imgEditorOrigY = imgEditorY;
  };
  stage.ontouchmove = (ev) => {
    if (!imgEditorDragging) return;
    const t = ev.touches[0];
    imgEditorX = imgEditorOrigX + (t.clientX - imgEditorDragStartX);
    imgEditorY = imgEditorOrigY + (t.clientY - imgEditorDragStartY);
    imgEditorApplyTransform(); ev.preventDefault();
  };
  stage.ontouchend = () => { imgEditorDragging = false; };
  // Scroll to zoom
  stage.onwheel = (ev) => {
    ev.preventDefault();
    const delta = ev.deltaY > 0 ? 0.9 : 1.1;
    const newScale = Math.min(5, Math.max(0.1, imgEditorScale * delta));
    const rect = stage.getBoundingClientRect();
    const mx = ev.clientX - rect.left, my = ev.clientY - rect.top;
    imgEditorX = mx - (mx - imgEditorX) * (newScale / imgEditorScale);
    imgEditorY = my - (my - imgEditorY) * (newScale / imgEditorScale);
    imgEditorScale = newScale;
    const slider = document.getElementById('imgZoomSlider');
    if (slider) { slider.value = Math.round(imgEditorScale * 100); document.getElementById('imgZoomLabel').textContent = Math.round(imgEditorScale * 100) + '%'; }
    imgEditorApplyTransform();
  };
}

function imgEditorMouseMove(ev) {
  if (!imgEditorDragging) return;
  imgEditorX = imgEditorOrigX + (ev.clientX - imgEditorDragStartX);
  imgEditorY = imgEditorOrigY + (ev.clientY - imgEditorDragStartY);
  imgEditorApplyTransform();
}

function imgEditorMouseUp() {
  imgEditorDragging = false;
  const stage = document.getElementById('imgEditorStage');
  if (stage) stage.classList.remove('dragging');
}

function imgEditorCrop() {
  const img = document.getElementById('imgEditorImg'); if (!img) return;
  const stage = document.getElementById('imgEditorStage'); if (!stage) return;
  const stageW = stage.offsetWidth, stageH = stage.offsetHeight;
  // Render to canvas
  const canvas = document.createElement('canvas');
  canvas.width = stageW; canvas.height = stageH;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, stageW, stageH);
  const drawX = imgEditorX, drawY = imgEditorY;
  const drawW = img.naturalWidth * imgEditorScale;
  const drawH = img.naturalHeight * imgEditorScale;
  ctx.drawImage(img, drawX, drawY, drawW, drawH);
  editImageData = canvas.toDataURL('image/jpeg', 0.92);
  const p = document.getElementById('fImgPrev');
  if (p) p.innerHTML = `<img src="${editImageData}"><div class="img-ov">📷 Change</div>`;
  document.getElementById('imgEditorOverlay').remove();
  // Cleanup listeners
  window.removeEventListener('mousemove', imgEditorMouseMove);
  window.removeEventListener('mouseup', imgEditorMouseUp);
}

function autoLink(html){
  const all=[];CATS.forEach(cat=>(world.entries[cat.id]||[]).forEach(e=>all.push({name:e.name,catId:cat.id,id:e.id})));
  all.sort((a,b)=>b.name.length-a.name.length);let r=html;
  all.forEach(e=>{
    const escaped=esc(e.name);
    try{const rx=new RegExp('(?<![\\w>])'+escaped.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'(?![\\w<])','gi');
    r=r.replace(rx,m=>`<a href="#" onclick="viewEntry('${e.catId}','${e.id}');return false;">${m}</a>`);}catch(_){}
  });return r;
}
function findMentions(name,excludeCat,excludeId){
  const results=[];const lower=name.toLowerCase();
  CATS.forEach(cat=>(world.entries[cat.id]||[]).forEach(entry=>{
    if(entry.id===excludeId&&cat.id===excludeCat)return;
    const txt=Object.entries(entry).filter(([k])=>k!=='image').map(([,v])=>v).join(' ').toLowerCase();
    if(txt.includes(lower))results.push({catId:cat.id,id:entry.id,name:entry.name});
  }));return results;
}

function buildSummary(){
  let s=`WORLD: ${world.title}\nCURRENT YEAR: ${world.currentYear||'unknown'}\n\n`;

}
function fmtAI(text){return text.split('\n').map(l=>{if(/^\d+\./.test(l))return`<li style="margin-bottom:7px">${l.replace(/^\d+\.\s*/,'')}</li>`;if(l.startsWith('- '))return`<li style="margin-bottom:7px">${l.slice(2)}</li>`;return`<p style="margin-bottom:7px">${l}</p>`;}).join('');}

// ── State ──
let ghToken = localStorage.getItem('wb_gh_token') || '';
let currentFileName = localStorage.getItem('wb_current_file') || '';
let currentFileSHA = '';        // GitHub needs SHA to update existing files
let saveDebounceTimer = null;
let hasUnsavedChanges = false;
let isSaving = false;

// ── Save status UI ──
function setSaveStatus(status, msg) {
  const el = document.getElementById('saveStatusEl');
  if (!el) return;
  el.className = 'save-status ' + status;
  const dot = el.querySelector('.ss-dot');
  const label = el.querySelector('.ss-label');
  if (!label) return;
  if (status === 'saved') {
    const t = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    label.textContent = 'Saved ' + t;
  } else if (status === 'unsaved') {
    label.textContent = msg || 'Unsaved — saving soon…';
  } else if (status === 'saving') {
    label.textContent = 'Saving to GitHub…';
  } else if (status === 'error') {
    label.textContent = msg || 'Save failed — click to retry';
  } else if (status === 'loading') {
    label.textContent = msg || 'Loading…';
  }
}

// ── Mark dirty — triggers debounced auto-save ──
function markDirty() {
  hasUnsavedChanges = true;
  setSaveStatus('unsaved');
  clearTimeout(saveDebounceTimer);
  saveDebounceTimer = setTimeout(() => autoSave(), 3000);
}

// ── Auto-save ──
async function autoSave() {
  if (!hasUnsavedChanges || isSaving) return;
  if (ghToken && currentFileName) {
    await saveToGitHub();
  } else {
    saveToLocalStorage();
    setSaveStatus('saved');
    hasUnsavedChanges = false;
  }
}

// ── GitHub API helpers ──
async function ghFetch(path, method='GET', body=null) {
  if (!ghToken) throw new Error('No GitHub token configured');
  const opts = {
    method,
    headers: {
      'Authorization': 'token ' + ghToken,
      'Accept': 'application/vnd.github.v3+json',
      'Content-Type': 'application/json'
    }
  };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(GH_API + path, opts);
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.message || `GitHub API error ${res.status}`);
  }
  return res.status === 204 ? null : res.json();
}

// ── Save world to GitHub ──
async function saveToGitHub(silent=false) {
  if (!ghToken || !currentFileName) return false;
  isSaving = true;
  if (!silent) setSaveStatus('saving');
  try {
    const ly = document.getElementById('landingYearInput');
    if (ly) world.currentYear = ly.value;
    const jsonStr = JSON.stringify(world, null, 2);
    const encoded = btoa(unescape(encodeURIComponent(jsonStr)));
    const payload = {
      message: `Auto-save: ${world.title} — ${new Date().toLocaleString()}`,
      content: encoded,
      branch: GH_BRANCH
    };
    if (currentFileSHA) payload.sha = currentFileSHA;
    const res = await ghFetch(`/repos/${GH_USER}/${GH_REPO}/contents/${currentFileName}`, 'PUT', payload);
    currentFileSHA = res?.content?.sha || currentFileSHA;
    hasUnsavedChanges = false;
    isSaving = false;
    setSaveStatus('saved');
    // Also update localStorage as backup
    saveToLocalStorage();
    return true;
  } catch(err) {
    isSaving = false;
    console.error('GitHub save error:', err);
    setSaveStatus('error', 'Save failed: ' + err.message);
    return false;
  }
}

// ── Load world from GitHub ──
async function loadFromGitHub(fileName) {
  setSaveStatus('loading', 'Loading from GitHub…');
  try {
    const res = await ghFetch(`/repos/${GH_USER}/${GH_REPO}/contents/${fileName}`);
    const jsonStr = decodeURIComponent(escape(atob(res.content.replace(/\n/g,''))));
    const data = JSON.parse(jsonStr);
    if (!data.entries) throw new Error('Invalid world file');
    CATS.forEach(c => { if (!data.entries[c.id]) data.entries[c.id] = []; });
    if (data.entries.factions) { const seen = {}; data.entries.factions = data.entries.factions.map(f => { if (f.type && !f.factionType) { f.factionType = f.type; delete f.type; } return f; }).filter(f => { if (f.factionType === 'Familial House') return false; if (seen[f.name]) return false; seen[f.name] = true; return true; }); }
    world = data;
    currentFileName = fileName;
    currentFileSHA = res.sha;
    localStorage.setItem('wb_current_file', fileName);
    hasUnsavedChanges = false;
    setSaveStatus('saved');
    updateGHBar();
    document.getElementById('worldTitleDisplay').textContent = world.title || 'My World';
    document.getElementById('worldSubDisplay').textContent = world.subtitle || '';
    document.title = (world.title || 'My World') + ' | World Builder';
    return true;
  } catch(err) {
    setSaveStatus('error', 'Load failed: ' + err.message);
    showToast('Error loading from GitHub: ' + err.message);
    return false;
  }
}

// ── Scan GitHub repo for world JSON files ──
async function scanGitHubForWorlds() {
  if (!ghToken) return [];
  try {
    const res = await ghFetch(`/repos/${GH_USER}/${GH_REPO}/contents/`);
    const jsonFiles = res.filter(f => f.type === 'file' && f.name.endsWith('.json') && !f.name.includes('package'));
    const worlds = [];
    for (const f of jsonFiles) {
      try {
        const fileRes = await ghFetch(`/repos/${GH_USER}/${GH_REPO}/contents/${f.name}`);
        const jsonStr = decodeURIComponent(escape(atob(fileRes.content.replace(/\n/g,''))));
        const data = JSON.parse(jsonStr);
        worlds.push({
          fileName: f.name,
          sha: f.sha,
          title: data.title || f.name.replace('.json','').replace(/_/g,' '),
          subtitle: data.subtitle || '',
          entryCount: Object.values(data.entries||{}).flat().length,
          currentYear: data.currentYear || ''
        });
      } catch(e) { /* skip malformed */ }
    }
    return worlds.sort((a,b) => a.title.localeCompare(b.title));
  } catch(err) {
    console.error('Scan error:', err);
    return [];
  }
}

// ── localStorage fallback ──
function saveToLocalStorage() {
  try {
    const key = 'wb_world_' + (world.title||'default').replace(/[^a-z0-9]/gi,'_');
    localStorage.setItem(key, JSON.stringify(world));
    const list = getLocalWorldList();
    const idx = list.findIndex(w => w.key === key);
    const entry = { key, title: world.title, subtitle: world.subtitle||'', saved: new Date().toISOString() };
    if (idx >= 0) list[idx] = entry; else list.push(entry);
    localStorage.setItem('wb_local_worlds', JSON.stringify(list));
  } catch(e) { console.error('localStorage save failed:', e); }
}

function getLocalWorldList() {
  try { return JSON.parse(localStorage.getItem('wb_local_worlds') || '[]'); } catch(e) { return []; }
}

// ── Update GitHub status bar ──
function updateGHBar() {
  const el = document.getElementById('folderBarEl');
  if (!el) return;
  if (ghToken && currentFileName) {
    el.innerHTML = `<span class="fb-icon">⚙</span><span class="fb-path">GitHub · ${currentFileName}</span>`;
    el.title = `Saving to GitHub: ${GH_USER}/${GH_REPO}/${currentFileName}`;
  } else if (ghToken) {
    el.innerHTML = `<span class="fb-icon">⚙</span><span class="fb-path">GitHub connected</span>`;
  } else {
    el.innerHTML = `<span class="fb-icon">⚙</span><span class="fb-path">Connect GitHub</span>`;
  }
}

// ── Generate filename from world title ──
function worldToFileName(title) {
  return (title||'My_World').replace(/[^a-z0-9\s]/gi,'').trim().replace(/\s+/g,'_') + '_Bible.json';
}

// ── Beforeunload warning ──
window.addEventListener('beforeunload', e => {
  if (hasUnsavedChanges) {
    e.preventDefault();
    e.returnValue = 'You have unsaved changes. Are you sure you want to leave?';
    return e.returnValue;
  }
});

// ── Manual save (header button) ──
async function saveToFile() {
  const ly = document.getElementById('landingYearInput');
  if (ly) world.currentYear = ly.value;
  if (ghToken && currentFileName) {
    clearTimeout(saveDebounceTimer);
    await saveToGitHub();
  } else {
    downloadJSON();
  }
}

// ── Download JSON backup to device ──
function downloadJSON() {
  const blob = new Blob([JSON.stringify(world,null,2)], {type:'application/json'});
  const a = Object.assign(document.createElement('a'), {
    href: URL.createObjectURL(blob),
    download: worldToFileName(world.title)
  });
  a.click(); URL.revokeObjectURL(a.href);
  showToast('Backup downloaded!', true);
}

// ── Load from file (fallback) ──
function loadFromFile() { document.getElementById('fileInput').click(); }

function handleFileLoad(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if (!data.entries) throw new Error('Invalid world file.');
      CATS.forEach(c => { if (!data.entries[c.id]) data.entries[c.id] = []; });
      // Migrate & deduplicate factions: remove old 'Familial House' type entries
      // and ensure old 'type' field is renamed to 'factionType'
      if (data.entries.factions) {
        const seen = {};
        data.entries.factions = data.entries.factions
          .map(f => { if (f.type && !f.factionType) { f.factionType = f.type; delete f.type; } return f; })
          .filter(f => { if (f.factionType === 'Familial House') return false; if (seen[f.name]) return false; seen[f.name] = true; return true; });
      }
      world = data;
      currentFileName = file.name;
      localStorage.setItem('wb_current_file', file.name);
      document.getElementById('worldTitleDisplay').textContent = world.title||'My World';
      document.getElementById('worldSubDisplay').textContent = world.subtitle||'';
      document.title = (world.title||'My World') + ' | World Builder';
      hasUnsavedChanges = false; setSaveStatus('saved');
      currentView = null; renderSidebar(); showLanding();
      showToast('World loaded!', true);
    } catch(err) { showToast('Error: '+err.message); }
  };
  reader.readAsText(file); e.target.value = '';
}

// ═══════════════════════════════════════════════════════════
// WORLD PICKER
// ═══════════════════════════════════════════════════════════
async function showWorldPicker() {
  // Remove existing picker if any
  document.getElementById('worldPicker')?.remove();
  const overlay = document.createElement('div');
  overlay.className = 'world-picker';
  overlay.id = 'worldPicker';

  const inner = document.createElement('div');
  inner.className = 'world-picker-inner';
  inner.innerHTML = `
    <div class="wp-title">⚔ World Builder</div>
    <div class="wp-subtitle">Your chronicle of worlds, factions & lore</div>`;

  // ── GitHub section ──
  if (ghToken) {
    const lbl = document.createElement('div');
    lbl.className = 'wp-section-label';
    lbl.innerHTML = `⚙ GitHub — ${GH_USER}/${GH_REPO} <span style="font-weight:400;font-size:12px;margin-left:8px;cursor:pointer;color:var(--accent)" onclick="promptChangeToken()">Change token</span>`;
    inner.appendChild(lbl);

    const scanning = document.createElement('div');
    scanning.style.cssText = 'text-align:center;padding:20px;color:var(--text3);font-style:italic;font-size:16px';
    scanning.textContent = 'Scanning repository for worlds…';
    inner.appendChild(scanning);
    overlay.appendChild(inner);
    document.body.appendChild(overlay);

    const ghWorlds = await scanGitHubForWorlds();
    scanning.remove();

    if (ghWorlds.length) {
      const list = document.createElement('div'); list.className = 'wp-worlds';
      ghWorlds.forEach(w => {
        const card = document.createElement('div'); card.className = 'wp-world-card';
        card.innerHTML = `
          <div class="wp-world-icon">📖</div>
          <div class="wp-world-info">
            <div class="wp-world-name">${esc(w.title)}</div>
            <div class="wp-world-meta">${esc(w.subtitle||'')}${w.subtitle?' · ':''}${w.entryCount} entries${w.currentYear?' · Year '+w.currentYear:''}</div>
          </div>`;
        card.onclick = async () => {
          overlay.remove();
          const ok = await loadFromGitHub(w.fileName);
          if (ok) { currentView=null; renderSidebar(); showLanding(); showToast('Loaded: '+w.title, true); }
        };
        list.appendChild(card);
      });
      inner.appendChild(list);
    } else {
      const empty = document.createElement('div'); empty.className = 'wp-no-worlds';
      empty.textContent = 'No world JSON files found in the repository yet.';
      inner.appendChild(empty);
    }
  } else {
    overlay.appendChild(inner);
    document.body.appendChild(overlay);
  }

  // ── localStorage worlds ──
  const localWorlds = getLocalWorldList();
  if (localWorlds.length) {
    const lbl2 = document.createElement('div'); lbl2.className = 'wp-section-label';
    lbl2.textContent = '💾 Saved in Browser (offline backup)';
    inner.appendChild(lbl2);
    const list2 = document.createElement('div'); list2.className = 'wp-worlds';
    localWorlds.forEach(w => {
      const card = document.createElement('div'); card.className = 'wp-world-card';
      card.innerHTML = `
        <div class="wp-world-icon">📖</div>
        <div class="wp-world-info">
          <div class="wp-world-name">${esc(w.title)}</div>
          <div class="wp-world-meta">Last saved ${new Date(w.saved).toLocaleDateString()}</div>
        </div>
        <button class="wp-world-delete" title="Delete from browser">✕</button>`;
      card.onclick = () => {
        try {
          const data = JSON.parse(localStorage.getItem(w.key));
          CATS.forEach(c => { if (!data.entries[c.id]) data.entries[c.id] = []; });
          world = data; currentFileName = null;
          overlay.remove();
          document.getElementById('worldTitleDisplay').textContent = world.title;
          document.getElementById('worldSubDisplay').textContent = world.subtitle||'';
          document.title = world.title + ' | World Builder';
          hasUnsavedChanges = false; setSaveStatus('saved');
          currentView=null; renderSidebar(); showLanding();
          showToast('Loaded: '+world.title, true);
        } catch(e) { showToast('Error: '+e.message); }
      };
      card.querySelector('.wp-world-delete').onclick = ev => {
        ev.stopPropagation();
        if (confirm(`Delete "${w.title}" from browser storage?`)) {
          localStorage.removeItem(w.key);
          const l = getLocalWorldList().filter(x=>x.key!==w.key);
          localStorage.setItem('wb_local_worlds', JSON.stringify(l));
          card.remove();
        }
      };
      list2.appendChild(card);
    });
    inner.appendChild(list2);
  }

  // ── Actions ──
  const acts = document.createElement('div'); acts.className = 'wp-actions';

  // GitHub token button
  const ghBtn = document.createElement('div'); ghBtn.className = 'wp-folder-btn';
  ghBtn.innerHTML = `<div class="wp-folder-icon">⚙</div>
    <div><strong>${ghToken ? 'GitHub Connected ✓' : 'Connect GitHub'}</strong><br>
    <span style="font-size:13px;color:var(--text3)">${ghToken ? 'Auto-saves to '+GH_USER+'/'+GH_REPO : 'Enter your GitHub token to enable cloud sync'}</span></div>`;
  ghBtn.onclick = () => promptChangeToken();
  acts.appendChild(ghBtn);

  // New world
  const newBtn = document.createElement('button'); newBtn.className = 'btn btn-primary';
  newBtn.style.cssText = 'width:100%;padding:14px;font-size:16px;justify-content:center';
  newBtn.textContent = '+ Create New World';
  newBtn.onclick = () => { overlay.remove(); promptNewWorld(); };
  acts.appendChild(newBtn);

  // Load from file
  const fileBtn = document.createElement('button'); fileBtn.className = 'btn btn-secondary';
  fileBtn.style.cssText = 'width:100%;justify-content:center';
  fileBtn.textContent = '⬆ Load from JSON File';
  fileBtn.onclick = () => { overlay.remove(); loadFromFile(); };
  acts.appendChild(fileBtn);

  inner.appendChild(acts);
  if (!overlay.contains(inner)) overlay.appendChild(inner);
  if (!document.body.contains(overlay)) document.body.appendChild(overlay);
}

// ── Prompt for GitHub token ──
function promptChangeToken() {
  document.getElementById('worldPicker')?.remove();
  showModal('Connect GitHub', 'Enter your GitHub Personal Access Token. It will be stored in this browser only and used to read/write your world files.', `
    <div class="nw-form">
      <div class="form-group">
        <label class="form-label">Personal Access Token</label>
        <input class="form-input" id="mGHToken" type="password" placeholder="ghp_…" value="${esc(ghToken)}">
      </div>
      <p style="font-size:13px;color:var(--text3);line-height:1.5">Generate at: GitHub → Settings → Developer settings → Personal access tokens → Tokens (classic). Tick the <strong>repo</strong> scope.</p>
    </div>`, [
    { label:'Cancel', cls:'btn-ghost', action:() => { closeModal(); showWorldPicker(); } },
    { label:'Save & Connect', cls:'btn-primary', action:async () => {
      const t = document.getElementById('mGHToken')?.value?.trim();
      if (!t) { showToast('No token entered'); return; }
      ghToken = t;
      localStorage.setItem('wb_gh_token', t);
      closeModal();
      updateGHBar();
      showWorldPicker();
    }}
  ]);
  setTimeout(() => document.getElementById('mGHToken')?.focus(), 100);
}

// ── Create new world ──
function promptNewWorld() {
  showModal('Create New World', '', `
    <div class="nw-form">
      <div class="form-group"><label class="form-label">World Name</label><input class="form-input" id="nwName" placeholder="e.g. Thalassar…"></div>
      <div class="form-group"><label class="form-label">Tagline / Subtitle</label><input class="form-input" id="nwSub" placeholder="Optional…"></div>
      <div class="form-group"><label class="form-label">Starting Year</label><input class="form-input" id="nwYear" placeholder="e.g. 1042…"></div>
    </div>`, [
    { label:'Cancel', cls:'btn-ghost', action:() => { closeModal(); showWorldPicker(); } },
    { label:'✦ Create World', cls:'btn-primary', action:async () => {
      const name = document.getElementById('nwName')?.value?.trim();
      if (!name) { showToast('World needs a name.'); return; }
      world = {
        title: name,
        subtitle: document.getElementById('nwSub')?.value?.trim()||'',
        currentYear: document.getElementById('nwYear')?.value?.trim()||'',
        entries:{}
      };
      CATS.forEach(c => { world.entries[c.id] = []; });
      currentFileName = worldToFileName(name);
      currentFileSHA = '';
      localStorage.setItem('wb_current_file', currentFileName);
      document.getElementById('worldTitleDisplay').textContent = world.title;
      document.getElementById('worldSubDisplay').textContent = world.subtitle||'';
      document.title = world.title + ' | World Builder';
      hasUnsavedChanges = true;
      closeModal();
      currentView=null; renderSidebar(); showLanding();
      updateGHBar();
      if (ghToken) {
        await saveToGitHub();
        showToast('World created and saved to GitHub!', true);
      } else {
        saveToLocalStorage(); setSaveStatus('saved'); hasUnsavedChanges = false;
        showToast('World created! (saved in browser)', true);
      }
    }}
  ]);
  setTimeout(() => document.getElementById('nwName')?.focus(), 100);
}

// ── Switch world ──
function switchWorld() {
  if (hasUnsavedChanges) {
    if (!confirm('You have unsaved changes. Switch worlds anyway?')) return;
  }
  showWorldPicker();
}

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════
(async function init() {
  document.getElementById('worldTitleDisplay').textContent = world.title;
  document.title = world.title + ' | World Builder';
  updateGHBar();

  // If we have a token and a known current file, try to load from GitHub
  if (ghToken && currentFileName) {
    setSaveStatus('loading', 'Loading from GitHub…');
    const ok = await loadFromGitHub(currentFileName);
    if (ok) {
      currentView = null; renderSidebar(); showLanding();
      return;
    }
    // If load failed, fall through to world picker
  }

  // Try localStorage
  const localWorlds = getLocalWorldList();
  if (localWorlds.length && !ghToken) {
    try {
      const recent = localWorlds[localWorlds.length-1];
      const data = JSON.parse(localStorage.getItem(recent.key)||'{}');
      if (data.entries) {
        CATS.forEach(c => { if (!data.entries[c.id]) data.entries[c.id] = []; });
        world = data;
        document.getElementById('worldTitleDisplay').textContent = world.title;
        document.getElementById('worldSubDisplay').textContent = world.subtitle||'';
        document.title = world.title + ' | World Builder';
        hasUnsavedChanges = false; setSaveStatus('saved');
        currentView=null; renderSidebar(); showLanding();
        return;
      }
    } catch(e) {}
  }

  // First time or no data found — show world picker
  setTimeout(() => showWorldPicker(), 100);
})();

</script></body></html>
