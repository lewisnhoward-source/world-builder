<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Bible</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f7f5f0;--bg2:#efecea;--bg3:#e8e4de;
  --surface:#fff;--surface2:#f9f8f5;
  --border:#ddd8ce;--border2:#c8c0b0;
  --text:#1a1714;--text2:#4a4540;--text3:#8a8070;
  --accent:#7c5c38;--accent2:#a07848;
  --accent-light:#f0e8d8;--accent-lighter:#faf6ef;
  --red:#b83030;--red-light:#fdf0f0;
  --green:#3a7a50;--green-light:#f0faf4;
  --blue:#3a5a8a;--blue-light:#eef3fc;
  --purple:#6040a0;--purple-light:#f2eeff;
  --sidebar-w:320px;--header-h:64px;
  --radius:8px;--radius-lg:12px;
  --shadow:0 1px 4px rgba(0,0,0,.08);
  --shadow-lg:0 4px 24px rgba(0,0,0,.12);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Lora',Georgia,serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column;font-size:17px}

/* ── HEADER ── */
header{height:var(--header-h);background:var(--surface);border-bottom:2px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:16px;flex-shrink:0;box-shadow:0 2px 6px rgba(0,0,0,.06)}
.world-title{font-family:'Playfair Display',serif;font-size:24px;font-weight:700;color:var(--accent);cursor:pointer;display:flex;align-items:baseline;gap:12px;flex:1}
.world-title:hover{color:var(--accent2)}
.world-title .sub{font-size:15px;font-weight:400;font-style:italic;color:var(--text3);font-family:'Lora',serif}
.header-btns{display:flex;gap:10px;align-items:center}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 20px;font-family:'Lora',serif;font-size:15px;border-radius:var(--radius);cursor:pointer;transition:all .15s;border:none;font-weight:500;white-space:nowrap}
.btn-primary{background:var(--accent);color:#fff;box-shadow:0 1px 4px rgba(124,92,56,.3)}
.btn-primary:hover{background:#6a4c2c}
.btn-secondary{background:var(--surface);color:var(--text2);border:2px solid var(--border2)}
.btn-secondary:hover{background:var(--bg2);border-color:var(--accent);color:var(--accent)}
.btn-ghost{background:transparent;color:var(--text3);border:2px solid transparent}
.btn-ghost:hover{background:var(--bg2);color:var(--text)}
.btn-danger{background:var(--red-light);color:var(--red);border:2px solid #e8b0b0}
.btn-danger:hover{background:#fce0e0}
.btn-oracle{background:linear-gradient(135deg,#5a3e78,#7c5c38);color:#fff;box-shadow:0 1px 4px rgba(90,62,120,.3)}
.btn-oracle:hover{background:linear-gradient(135deg,#4a2e68,#6a4c28)}
.btn-sm{padding:6px 14px;font-size:14px}

/* ── LAYOUT ── */
.main{display:flex;flex:1;overflow:hidden}

/* ── SIDEBAR ── */
aside{width:var(--sidebar-w);background:var(--surface);border-right:2px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0}
.sb-search{padding:12px 14px 10px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:1}
.sb-search input{width:100%;background:var(--bg2);border:2px solid var(--border);border-radius:var(--radius);padding:9px 14px;font-family:'Lora',serif;font-size:16px;color:var(--text);outline:none}
.sb-search input:focus{border-color:var(--accent);background:#fff}
.sb-search input::placeholder{color:var(--text3)}
.sb-section{border-bottom:1px solid var(--border)}
.sb-cat-hdr{display:flex;align-items:center;padding:13px 16px 8px;cursor:pointer;user-select:none;transition:background .12s}
.sb-cat-hdr:hover{background:var(--bg2)}
.sb-cat-label{font-family:'Playfair Display',serif;font-size:13px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);flex:1;display:flex;align-items:center;gap:8px}
.sb-cat-label .ci{font-size:18px}
.sb-cat-count{font-size:13px;color:var(--text3);margin-right:8px;background:var(--bg3);padding:2px 8px;border-radius:20px}
.sb-cat-arrow{font-size:12px;color:var(--text3)}
.sb-new{display:flex;align-items:center;gap:10px;padding:7px 16px 11px 42px;font-size:15px;color:var(--text3);cursor:pointer;transition:color .15s}
.sb-new:hover{color:var(--accent)}
.sb-new .plus{width:22px;height:22px;background:var(--bg3);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;line-height:1;transition:background .15s;flex-shrink:0}
.sb-new:hover .plus{background:var(--accent-light)}
.sb-view-all{display:flex;align-items:center;gap:6px;padding:4px 16px 8px 44px;font-size:13px;color:var(--accent);cursor:pointer;transition:color .15s;font-style:italic}
.sb-view-all:hover{color:var(--accent2)}
.tree-row{display:flex;align-items:center;cursor:pointer;transition:background .12s;position:relative}
.tree-row:hover{background:var(--bg2)}
.tree-row.active{background:var(--accent-light)}
.tree-row.active .tr-name{color:var(--accent);font-weight:500}
.tr-exp{width:22px;height:36px;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:10px;flex-shrink:0;transition:transform .15s}
.tr-exp.open{transform:rotate(90deg)}
.tr-name{flex:1;padding:8px 12px 8px 2px;font-size:16px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tr-type{font-size:11px;padding:2px 8px;border-radius:20px;margin-right:10px;background:var(--bg3);color:var(--text3);white-space:nowrap;flex-shrink:0}
.sb-empty{padding:6px 16px 8px 44px;font-size:15px;color:var(--text3);font-style:italic}

/* ── CONTENT ── */
.content{flex:1;overflow-y:auto;background:var(--bg)}

/* ── LANDING PAGE ── */
.landing{position:relative;min-height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 40px;text-align:center;overflow:hidden}
.landing-bg{position:absolute;inset:0;background:linear-gradient(160deg,#f0ebe0 0%,#e8e0d0 40%,#ddd5c0 100%);z-index:0}
.landing-bg-map{position:absolute;inset:0;opacity:.07;background-image:url("data:image/svg+xml,%3Csvg width='800' height='600' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M100,150 Q200,80 350,120 Q500,160 600,100 Q700,50 750,150 Q780,220 720,300 Q660,380 580,360 Q500,340 420,400 Q340,460 250,420 Q160,380 120,300 Q80,220 100,150Z' fill='%237c5c38' stroke='%237c5c38' stroke-width='2'/%3E%3Cpath d='M200,200 Q260,180 300,220 Q340,260 280,280 Q220,300 200,260 Q180,220 200,200Z' fill='%23c8b888'/%3E%3Cpath d='M400,150 Q450,130 480,170 Q510,210 460,230 Q410,250 390,210 Q370,170 400,150Z' fill='%23c8b888'/%3E%3Cpath d='M500,280 Q560,260 590,300 Q620,340 570,360 Q520,380 500,340 Q480,300 500,280Z' fill='%23c8b888'/%3E%3Ctext x='240' y='245' font-size='12' fill='%237c5c38' font-family='serif' opacity='.6'%3EHighlands%3C/text%3E%3Ctext x='400' y='190' font-size='12' fill='%237c5c38' font-family='serif' opacity='.6'%3ENorthreach%3C/text%3E%3Ctext x='490' y='325' font-size='12' fill='%237c5c38' font-family='serif' opacity='.6'%3EEastmarch%3C/text%3E%3C/svg%3E");background-size:cover;background-position:center}
.landing-content{position:relative;z-index:1;max-width:600px}
.landing-title{font-family:'Playfair Display',serif;font-size:64px;font-weight:700;color:var(--accent);line-height:1.1;margin-bottom:10px;text-shadow:0 2px 8px rgba(255,255,255,.5)}
.landing-subtitle{font-size:20px;font-style:italic;color:var(--text2);margin-bottom:40px}
.landing-year-block{display:inline-flex;flex-direction:column;align-items:center;gap:8px;background:rgba(255,255,255,.8);border:2px solid var(--border2);border-radius:var(--radius-lg);padding:20px 32px;backdrop-filter:blur(4px)}
.landing-year-label{font-family:'Playfair Display',serif;font-size:13px;letter-spacing:.15em;text-transform:uppercase;color:var(--text3)}
.landing-year-input{font-family:'Playfair Display',serif;font-size:40px;font-weight:700;color:var(--accent);border:none;background:transparent;outline:none;text-align:center;width:160px}
.landing-year-input::placeholder{color:var(--border2)}
.landing-year-sub{font-size:13px;color:var(--text3);font-style:italic}
.landing-stats{display:flex;gap:32px;margin-top:40px;flex-wrap:wrap;justify-content:center}
.landing-stat{display:flex;flex-direction:column;align-items:center;gap:4px;background:rgba(255,255,255,.7);border:1px solid var(--border);border-radius:var(--radius);padding:14px 20px;cursor:pointer;transition:all .2s;min-width:100px}
.landing-stat:hover{background:rgba(255,255,255,.95);border-color:var(--accent);transform:translateY(-2px);box-shadow:var(--shadow)}
.landing-stat-num{font-family:'Playfair Display',serif;font-size:32px;font-weight:700;color:var(--accent)}
.landing-stat-label{font-size:13px;color:var(--text3);font-family:'Lora',serif}
.landing-upload-hint{margin-top:20px;font-size:13px;color:var(--text3);font-style:italic}

/* ── CATEGORY LANDING PAGES ── */
.cat-landing{padding:32px 40px 60px;max-width:1200px;width:100%}
.cat-landing-hdr{display:flex;align-items:center;gap:16px;margin-bottom:28px;padding-bottom:20px;border-bottom:2px solid var(--border)}
.cat-landing-hdr h1{font-family:'Playfair Display',serif;font-size:36px;font-weight:700;color:var(--text);flex:1}
.alpha-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
.alpha-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:14px 18px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:14px}
.alpha-card:hover{border-color:var(--accent);box-shadow:var(--shadow);transform:translateY(-1px)}
.alpha-card-img{width:44px;height:44px;border-radius:6px;object-fit:cover;flex-shrink:0;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:20px}
.alpha-card-name{font-size:17px;font-weight:500;color:var(--text);font-family:'Playfair Display',serif}
.alpha-card-sub{font-size:14px;color:var(--text3)}

/* Faction columns */
.faction-cols{display:flex;gap:24px;align-items:flex-start;overflow-x:auto;padding-bottom:16px}
.faction-col{flex:0 0 280px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.faction-col-hdr{padding:14px 18px;border-bottom:1px solid var(--border);font-family:'Playfair Display',serif;font-size:15px;font-weight:600;color:var(--text2);display:flex;align-items:center;gap:8px}
.faction-col-hdr .fch-icon{font-size:18px}
.faction-col-items{padding:8px 0}
.faction-col-item{padding:10px 18px;cursor:pointer;transition:background .12s;display:flex;align-items:center;gap:10px}
.faction-col-item:hover{background:var(--bg2)}
.fci-img{width:32px;height:32px;border-radius:4px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;overflow:hidden}
.fci-img img{width:100%;height:100%;object-fit:cover}
.fci-name{font-size:16px;color:var(--text)}
.fci-sub{font-size:13px;color:var(--text3)}

/* Location nested list */
.loc-nested{display:flex;flex-direction:column;gap:4px}
.loc-nest-item{display:flex;align-items:center;gap:10px;padding:8px 14px;border-radius:var(--radius);cursor:pointer;transition:background .12s}
.loc-nest-item:hover{background:var(--surface)}
.loc-nest-item.active{background:var(--accent-light)}
.loc-nest-name{font-size:17px;color:var(--text);flex:1}
.loc-nest-type{font-size:12px;padding:2px 8px;border-radius:20px;background:var(--bg3);color:var(--text3)}
.loc-nest-children{margin-left:28px;margin-top:4px;display:flex;flex-direction:column;gap:4px;border-left:2px solid var(--border);padding-left:12px}

/* Timeline */
.timeline-wrap{position:relative;padding:20px 0 60px}
.timeline-year-labels{display:flex;justify-content:space-between;font-size:13px;color:var(--text3);padding:0 40px;margin-bottom:8px}
.timeline-track{position:relative;margin:0 40px;height:4px;background:var(--border2);border-radius:2px}
.timeline-line{position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px}
.timeline-dot{position:absolute;top:50%;transform:translate(-50%,-50%);width:14px;height:14px;background:var(--accent);border:3px solid var(--surface);border-radius:50%;cursor:pointer;transition:all .15s;z-index:2}
.timeline-dot:hover{transform:translate(-50%,-50%) scale(1.4);background:var(--accent2)}
.timeline-dot.above .td-label{bottom:calc(100% + 12px);top:auto}
.timeline-dot.above .td-line{bottom:calc(100% + 2px);top:auto;height:10px}
.td-label{position:absolute;bottom:calc(100% + 12px);left:50%;transform:translateX(-50%);white-space:nowrap;font-size:13px;color:var(--text2);font-family:'Lora',serif;pointer-events:none;background:rgba(247,245,240,.9);padding:3px 8px;border-radius:4px;border:1px solid var(--border)}
.td-line{position:absolute;left:50%;bottom:calc(100% + 2px);width:1px;height:10px;background:var(--border2)}
.timeline-events-below{margin-top:60px;display:flex;flex-direction:column;gap:10px}

/* ── ENTRY VIEW ── */
.ev-wrap{padding:32px 40px 60px;max-width:1100px;width:100%}
.ev-top{display:flex;gap:28px;margin-bottom:28px;align-items:flex-start}
.ev-img-block{flex-shrink:0}
.ev-img{width:180px;height:180px;border-radius:var(--radius);object-fit:cover;border:2px solid var(--border);display:block}
.ev-img-ph{width:180px;height:180px;border-radius:var(--radius);border:2px dashed var(--border2);background:var(--surface2);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--text3)}
.ev-img-ph .ph-icon{font-size:36px;opacity:.4}
.ev-img-ph .ph-text{font-size:14px}
.ev-hdr{flex:1;min-width:0}
.ev-bc{font-size:14px;color:var(--text3);margin-bottom:8px;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.ev-bc a{color:var(--accent);cursor:pointer;text-decoration:none}
.ev-bc a:hover{text-decoration:underline}
.cat-tag{display:inline-block;font-family:'Lora',serif;font-size:12px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;padding:3px 12px;border-radius:20px;margin-bottom:10px}
.ev-h1{font-family:'Playfair Display',serif;font-size:38px;font-weight:700;color:var(--text);line-height:1.15;margin-bottom:6px}
.ev-subtitle{font-size:18px;font-style:italic;color:var(--text3);margin-bottom:16px}
.ev-acts{display:flex;gap:10px;flex-wrap:wrap}
.ev-divider{border:none;border-top:1.5px solid var(--border);margin:24px 0}
.fields-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px 30px}
.fg-s2{grid-column:span 2}
.fg-s3{grid-column:span 3}
.f-group{display:flex;flex-direction:column;gap:5px}
.f-lbl{font-family:'Lora',serif;font-size:12px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--text3)}
.f-val{font-size:17px;line-height:1.7;color:var(--text)}
.f-val a{color:var(--accent);text-decoration:none;border-bottom:1px solid transparent;transition:border-color .15s}
.f-val a:hover{border-bottom-color:var(--accent)}
.f-val.empty{color:var(--text3);font-style:italic}

/* Derived sections */
.derived-sec{margin-top:32px;padding-top:24px;border-top:1.5px solid var(--border)}
.derived-sec h3{font-family:'Playfair Display',serif;font-size:20px;color:var(--text2);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.derived-sec h3 .count{font-size:14px;background:var(--bg3);color:var(--text3);padding:2px 10px;border-radius:20px;font-family:'Lora',serif;font-weight:400}
.members-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
.member-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:12px 16px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:12px}
.member-card:hover{border-color:var(--accent);box-shadow:var(--shadow);transform:translateY(-1px)}
.mc-img{width:40px;height:40px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;overflow:hidden}
.mc-img img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.mc-name{font-size:16px;font-weight:500;color:var(--text)}
.mc-sub{font-size:13px;color:var(--text3)}

/* Children */
.children-sec{margin-top:32px;padding-top:24px;border-top:1.5px solid var(--border)}
.children-sec h3{font-family:'Playfair Display',serif;font-size:20px;color:var(--text2);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.children-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px;margin-bottom:14px}
.child-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:12px 16px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:12px}
.child-card:hover{border-color:var(--accent);box-shadow:var(--shadow);transform:translateY(-1px)}
.child-card-img{width:38px;height:38px;border-radius:6px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;overflow:hidden}
.child-card-img img{width:100%;height:100%;object-fit:cover;border-radius:6px}
.child-card-name{font-size:15px;font-weight:500;color:var(--text)}
.child-card-type{font-size:13px;color:var(--text3)}
.ref-sec{margin-top:28px;padding-top:20px;border-top:1px solid var(--border)}
.ref-sec h4{font-family:'Lora',serif;font-size:12px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:10px}
.ref-chips{display:flex;flex-wrap:wrap;gap:8px}
.ref-chip{font-size:14px;padding:5px 14px;border-radius:20px;background:var(--bg2);border:1px solid var(--border);color:var(--text2);cursor:pointer;transition:all .12s}
.ref-chip:hover{background:var(--accent-light);border-color:var(--accent);color:var(--accent)}

/* ── EDIT FORM ── */
.ef-wrap{padding:32px 40px 60px;max-width:1100px;width:100%}
.ef-top{display:flex;gap:28px;margin-bottom:24px;align-items:flex-start}
.ef-img-block{flex-shrink:0}
.ef-img-up{width:180px;height:180px;border-radius:var(--radius);border:2px dashed var(--border2);background:var(--surface2);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--text3);font-size:14px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.ef-img-up:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-lighter)}
.ef-img-up img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.ef-img-up .img-ov{position:absolute;inset:0;background:rgba(255,255,255,.88);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;opacity:0;transition:opacity .2s;font-size:14px;color:var(--accent)}
.ef-img-up:hover .img-ov{opacity:1}
.ef-img-up .up-ph{display:flex;flex-direction:column;align-items:center;gap:8px}
.ef-img-up .big-icon{font-size:36px;opacity:.4}
.ef-main{flex:1;min-width:0}
.ef-hdr-row{display:flex;align-items:center;gap:14px;margin-bottom:18px;padding-bottom:18px;border-bottom:1.5px solid var(--border)}
.ef-hdr-row h2{font-family:'Playfair Display',serif;font-size:24px;font-weight:600;flex:1;color:var(--text2)}
.ef-name{margin-bottom:22px}
.ef-name-input{width:100%;font-family:'Playfair Display',serif;font-size:30px;font-weight:700;color:var(--text);border:none;border-bottom:2px solid var(--border);background:transparent;padding:8px 0;outline:none;transition:border-color .2s}
.ef-name-input:focus{border-color:var(--accent)}
.ef-name-input::placeholder{color:var(--text3);font-weight:400}
.form-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px 26px}
.fg2{grid-column:span 2}
.fg3{grid-column:span 3}
.form-group{display:flex;flex-direction:column;gap:6px}
.form-label{font-family:'Lora',serif;font-size:12px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--text3)}
.form-input,.form-select,.form-textarea{font-family:'Lora',serif;font-size:16px;color:var(--text);background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:9px 14px;outline:none;transition:border-color .15s,box-shadow .15s;width:100%}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(124,92,56,.1)}
.form-textarea{resize:vertical;min-height:100px;line-height:1.65}
.form-select option{background:var(--surface)}
.form-actions{display:flex;gap:12px;justify-content:flex-end;padding-top:28px;margin-top:10px;border-top:1.5px solid var(--border)}

/* Category tags */
.tag-characters{background:#ede8f8;color:#6040a0}
.tag-factions{background:#fde8e8;color:#a04040}
.tag-locations{background:#e8f4ec;color:#3a7a50}
.tag-history{background:#fdf0e0;color:#9a6020}
.tag-lore{background:#e8eef8;color:#3a5a8a}
.tag-creatures{background:#fdeee8;color:#9a5030}

/* AI Panel */
.ai-panel{position:fixed;right:0;top:0;bottom:0;width:480px;background:var(--surface);border-left:2px solid var(--border);display:flex;flex-direction:column;z-index:100;transform:translateX(100%);transition:transform .28s ease;box-shadow:-4px 0 24px rgba(0,0,0,.1)}
.ai-panel.open{transform:translateX(0)}
.ai-ph{padding:20px 24px;border-bottom:1.5px solid var(--border);display:flex;align-items:center;gap:12px;background:linear-gradient(135deg,#f8f4ff,#faf6ef)}
.ai-ph h3{font-family:'Playfair Display',serif;font-size:18px;color:#5a3e78;flex:1}
.ai-close{background:none;border:none;color:var(--text3);font-size:26px;cursor:pointer;transition:color .15s;line-height:1;padding:0}
.ai-close:hover{color:var(--text)}
.ai-body{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:14px}
.ai-msg{border-radius:var(--radius);padding:16px 18px;font-size:16px;line-height:1.7}
.ai-msg.sys{background:#f8f4ff;border:1px solid #e0d0f8;color:#5a3e78;font-style:italic}
.ai-msg.thinking{background:var(--bg2);border:1px solid var(--border);color:var(--text3);font-style:italic}
.ai-msg.result{background:var(--surface);border:1.5px solid var(--border2);color:var(--text)}
.ai-msg.error{background:var(--red-light);border:1px solid #e8b0b0;color:var(--red)}
.ai-msg h4{font-family:'Playfair Display',serif;font-size:15px;color:#5a3e78;margin-bottom:12px}
.ai-foot{padding:18px 24px;border-top:1.5px solid var(--border);display:flex;flex-direction:column;gap:12px}
.ai-foot p{font-size:14px;color:var(--text3);line-height:1.5}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.38);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--surface);border-radius:12px;width:460px;padding:32px;display:flex;flex-direction:column;gap:18px;box-shadow:var(--shadow-lg);transform:scale(.97);transition:transform .2s}
.modal-overlay.open .modal{transform:scale(1)}
.modal h3{font-family:'Playfair Display',serif;font-size:22px;color:var(--text)}
.modal p{font-size:16px;color:var(--text2);line-height:1.6}
.modal-acts{display:flex;gap:12px;justify-content:flex-end}

/* Toast */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(14px);background:var(--text);color:#fff;padding:11px 22px;border-radius:var(--radius);font-family:'Lora',serif;font-size:15px;opacity:0;transition:all .25s;pointer-events:none;z-index:300;box-shadow:var(--shadow-lg)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{background:var(--green)}

/* Scrollbar */
::-webkit-scrollbar{width:7px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:var(--accent)}
/* ── STICKY FORM TOOLBAR ── */
.form-sticky-bar{position:sticky;top:0;z-index:10;background:var(--surface);border-bottom:2px solid var(--border);padding:12px 40px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 8px rgba(0,0,0,.06);margin:-32px -40px 28px;justify-content:flex-end}
.form-sticky-bar .form-title{font-family:'Playfair Display',serif;font-size:18px;color:var(--text2);flex:1;display:flex;align-items:center;gap:10px}

/* ── AUTOCOMPLETE ── */
.ac-wrap{position:relative}
.ac-dropdown{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--surface);border:2px solid var(--border2);border-radius:var(--radius);box-shadow:var(--shadow-lg);z-index:50;max-height:220px;overflow-y:auto;display:none}
.ac-dropdown.open{display:block}
.ac-item{padding:10px 14px;font-size:16px;color:var(--text);cursor:pointer;transition:background .1s;display:flex;align-items:center;gap:10px;font-family:'Lora',serif}
.ac-item:hover,.ac-item.highlighted{background:var(--accent-light);color:var(--accent)}
.ac-item-img{width:28px;height:28px;border-radius:4px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;overflow:hidden}
.ac-item-img img{width:100%;height:100%;object-fit:cover;border-radius:4px}
.ac-item-text{flex:1;min-width:0}
.ac-item-name{font-size:15px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ac-item-sub{font-size:12px;color:var(--text3)}
.ac-none{padding:10px 14px;font-size:14px;color:var(--text3);font-style:italic}

/* ── MULTI-ENTRY FIELD ── */
.multi-field{display:flex;flex-direction:column;gap:6px}
.multi-tags{display:flex;flex-wrap:wrap;gap:6px;min-height:0}
.multi-tag{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;background:var(--accent-light);border:1.5px solid var(--border2);border-radius:20px;font-size:14px;color:var(--accent);cursor:default}
.multi-tag .mt-remove{cursor:pointer;color:var(--text3);font-size:16px;line-height:1;transition:color .1s}
.multi-tag .mt-remove:hover{color:var(--red)}
.multi-input-wrap{position:relative}
.multi-input{width:100%;font-family:'Lora',serif;font-size:16px;color:var(--text);background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:8px 14px;outline:none;transition:border-color .15s,box-shadow .15s}
.multi-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(124,92,56,.1)}

/* ── FAMILY TREE ── */
.family-tree-sec{margin-top:36px;padding-top:28px;border-top:2px solid var(--border)}
.family-tree-sec h3{font-family:'Playfair Display',serif;font-size:22px;color:var(--text2);margin-bottom:24px;display:flex;align-items:center;gap:10px}
.family-tree-wrap{overflow-x:auto;padding-bottom:16px}
.ft-generation{display:flex;gap:0;justify-content:center;align-items:flex-start;position:relative;margin-bottom:0}
.ft-gen-row{display:flex;align-items:flex-start;justify-content:center;position:relative;width:100%}
.ft-connectors{position:relative;height:40px;width:100%}
.ft-node{display:flex;flex-direction:column;align-items:center;gap:6px;padding:0 16px;cursor:pointer;transition:transform .15s;min-width:100px}
.ft-node:hover{transform:translateY(-2px)}
.ft-node-img{width:72px;height:72px;border-radius:50%;border:3px solid var(--border2);background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:28px;overflow:hidden;transition:border-color .15s;box-shadow:var(--shadow)}
.ft-node:hover .ft-node-img{border-color:var(--accent)}
.ft-node-img img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.ft-node-name{font-size:13px;font-weight:500;color:var(--text);text-align:center;max-width:90px;line-height:1.3}
.ft-node-sub{font-size:11px;color:var(--text3);text-align:center}
.ft-node.deceased .ft-node-img{opacity:.6;filter:grayscale(.4)}
.ft-node.deceased .ft-node-name{color:var(--text3)}
.conflict-sides{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:12px 0;padding:16px;background:var(--bg2);border-radius:var(--radius);border:1px solid var(--border)}
.conflict-side-label{font-family:'Playfair Display',serif;font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:8px}
.conflict-side-a .conflict-side-label{color:#c04040}
.conflict-side-b .conflict-side-label{color:#3a5a8a}
/* SVG connector lines */
.ft-svg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:visible}

/* ── IMAGE EDITOR ── */
.img-editor-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:500;display:flex;align-items:center;justify-content:center}
.img-editor-modal{background:var(--surface);border-radius:var(--radius-lg);width:520px;max-width:95vw;box-shadow:0 24px 80px rgba(0,0,0,.5);overflow:hidden}
.img-editor-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border)}
.img-editor-header h3{font-family:'Playfair Display',serif;font-size:18px;color:var(--text)}
.img-editor-stage{position:relative;width:100%;height:320px;background:#1a1a1a;overflow:hidden;cursor:grab;user-select:none}
.img-editor-stage.dragging{cursor:grabbing}
.img-editor-stage img{position:absolute;transform-origin:top left;pointer-events:none;will-change:transform}
.img-editor-crop-overlay{position:absolute;inset:0;pointer-events:none}
.img-editor-controls{padding:16px 20px;display:flex;flex-direction:column;gap:12px;border-top:1px solid var(--border)}
.img-zoom-row{display:flex;align-items:center;gap:12px;font-size:14px;color:var(--text2)}
.img-zoom-row input[type=range]{flex:1;accent-color:var(--accent)}
.img-editor-actions{display:flex;gap:8px;justify-content:flex-end;padding:12px 20px;border-top:1px solid var(--border)}
/* ── RACES CATEGORY ── */
.tag-races{background:#fff0e8;color:#8a4020}

/* ── FAMILY FIELDS IN VIEW ── */
.family-sec{margin-top:32px;padding-top:24px;border-top:1.5px solid var(--border)}
.family-sec h3{font-family:'Playfair Display',serif;font-size:20px;color:var(--text2);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.family-sec h3 .count{font-size:14px;background:var(--bg3);color:var(--text3);padding:2px 10px;border-radius:20px;font-family:'Lora',serif;font-weight:400}
.family-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px}
.family-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:10px 14px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:10px}
.family-card:hover{border-color:var(--accent);box-shadow:var(--shadow);transform:translateY(-1px)}
.fc-img{width:36px;height:36px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;overflow:hidden}
.fc-img img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.fc-name{font-size:15px;font-weight:500;color:var(--text)}
.fc-rel{font-size:12px;color:var(--text3)}


/* ── FACTION TYPE SIDEBAR HEADERS ── */
.sb-type-hdr{display:flex;align-items:center;justify-content:space-between;padding:7px 16px 5px 22px;cursor:pointer;user-select:none;transition:background .12s}
.sb-type-hdr:hover{background:var(--accent-lighter)}
.sb-type-label{font-size:13px;font-weight:600;color:var(--text2);font-family:'Playfair Display',serif;display:flex;align-items:center;gap:8px}
.sb-type-arrow{font-size:10px;color:var(--text3)}
.sb-type-entry{display:flex;align-items:center;gap:10px;padding:6px 16px 6px 32px;cursor:pointer;transition:background .12s}
.sb-type-entry:hover{background:var(--bg2)}
.sb-type-entry.active{background:var(--accent-light)}
.sb-type-entry.active .ste-name{color:var(--accent);font-weight:500}
.ste-img{width:28px;height:28px;border-radius:4px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;overflow:hidden}
.ste-img img{width:100%;height:100%;object-fit:cover;border-radius:4px}
.ste-name{font-size:15px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}

/* ── FACTION TYPE GALLERY PAGE ── */
.faction-type-gallery{padding:32px 40px 60px;max-width:1200px;width:100%}
.ftg-hdr{display:flex;align-items:center;gap:16px;margin-bottom:32px;padding-bottom:20px;border-bottom:2px solid var(--border)}
.ftg-hdr h1{font-family:'Playfair Display',serif;font-size:36px;font-weight:700;color:var(--text);flex:1}
.ftg-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:24px}
.ftg-card{display:flex;flex-direction:column;align-items:center;gap:10px;cursor:pointer;transition:transform .2s}
.ftg-card:hover{transform:translateY(-4px)}
.ftg-banner{width:140px;height:140px;border-radius:var(--radius);border:2px solid var(--border);background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:48px;overflow:hidden;box-shadow:var(--shadow);transition:box-shadow .2s,border-color .2s}
.ftg-card:hover .ftg-banner{box-shadow:var(--shadow-lg);border-color:var(--accent)}
.ftg-banner img{width:100%;height:100%;object-fit:cover}
.ftg-name{font-family:'Playfair Display',serif;font-size:15px;font-weight:600;color:var(--text);text-align:center;line-height:1.3}
.ftg-sub{font-size:13px;color:var(--text3);text-align:center}

/* ── VERTICAL TIMELINE ── */
.vtl-wrap{padding:20px 0 60px;max-width:900px;margin:0 auto}
.vtl-line-container{position:relative;padding:20px 0}
.vtl-spine{position:absolute;left:50%;top:0;bottom:0;width:3px;background:linear-gradient(to bottom,var(--accent),var(--border2));transform:translateX(-50%);border-radius:2px;z-index:0}
.vtl-event{display:grid;grid-template-columns:1fr 40px 1fr;align-items:start;margin-bottom:48px;position:relative;gap:0}
.vtl-event.right .vtl-content-wrap{grid-column:3;grid-row:1;padding-left:24px;padding-right:0}
.vtl-event.right .vtl-dot-col{grid-column:2;grid-row:1}
.vtl-event.right .vtl-spacer{grid-column:1;grid-row:1}
.vtl-event.left .vtl-content-wrap{grid-column:1;grid-row:1;padding-right:24px;text-align:right}
.vtl-event.left .vtl-dot-col{grid-column:2;grid-row:1}
.vtl-event.left .vtl-spacer{grid-column:3;grid-row:1}
.vtl-dot-col{display:flex;justify-content:center;padding-top:16px;position:relative;z-index:2}
.vtl-dot{width:20px;height:20px;border-radius:50%;border:3px solid var(--surface);box-shadow:0 0 0 2px var(--border2);cursor:pointer;transition:transform .15s,box-shadow .15s;flex-shrink:0}
.vtl-dot:hover{transform:scale(1.35);box-shadow:0 0 0 3px var(--accent)}
.vtl-dot.conflict,.vtl-dot.war{background:#c04040;box-shadow:0 0 0 2px #e08080}
.vtl-dot.political{background:#3a5a8a;box-shadow:0 0 0 2px #8aaad0}
.vtl-dot.default{background:var(--accent);box-shadow:0 0 0 2px var(--accent-light)}
.vtl-dot.religious{background:#7c5c38;box-shadow:0 0 0 2px #c8a888}
.vtl-dot.catastrophe{background:#8a3060;box-shadow:0 0 0 2px #c880a0}
.vtl-dot.magical{background:#5a3e78;box-shadow:0 0 0 2px #a880c8}
.vtl-dot.discovery{background:#3a7a50;box-shadow:0 0 0 2px #80c8a0}
.vtl-dot.economic{background:#7a7020;box-shadow:0 0 0 2px #c8c080}
.vtl-content-wrap{padding:10px 0 20px;cursor:pointer}
.vtl-content-wrap:hover .vtl-name{color:var(--accent)}
.vtl-year{font-family:'Playfair Display',serif;font-size:13px;font-weight:700;color:var(--accent);letter-spacing:.05em;margin-bottom:4px}
.vtl-name{font-family:'Playfair Display',serif;font-size:18px;font-weight:600;color:var(--text);margin-bottom:6px;line-height:1.3}
.vtl-desc{font-size:14px;color:var(--text3);line-height:1.6}
.vtl-type-badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;margin-bottom:6px;font-family:'Lora',serif;font-weight:500}
.vtl-now{display:flex;align-items:center;justify-content:center;gap:10px;margin:0 0 48px;padding:8px 0;position:relative;z-index:2}
.vtl-now-line{flex:1;height:2px;background:var(--red);opacity:.4}
.vtl-now-label{font-family:'Playfair Display',serif;font-size:13px;color:var(--red);font-weight:600;white-space:nowrap;background:var(--bg);padding:0 8px}
.vtl-type-section{margin-bottom:48px}
.vtl-type-hdr{display:flex;align-items:center;gap:12px;margin-bottom:24px;padding-bottom:10px;border-bottom:2px solid var(--border)}
.vtl-type-hdr-dot{width:16px;height:16px;border-radius:50%;flex-shrink:0}
.vtl-type-hdr h3{font-family:'Playfair Display',serif;font-size:20px;font-weight:600;color:var(--text)}

/* ── CHARACTER FORM LAYOUT ── */
.char-form-top{display:grid;grid-template-columns:180px 1fr;gap:28px;margin-bottom:24px}
.char-fields-main{display:flex;flex-direction:column;gap:16px}
.char-row{display:grid;gap:16px}
.char-row-2{grid-template-columns:1fr 1fr}
.char-row-3{grid-template-columns:1fr 1fr 1fr}
.char-row-4{grid-template-columns:1fr 1fr 1fr 1fr}
.char-family-section{margin-top:4px;padding-top:16px;border-top:1.5px solid var(--border)}
.char-family-title{font-family:'Playfair Display',serif;font-size:18px;font-weight:600;color:var(--text2);margin-bottom:16px}
.age-display{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:var(--accent);padding:9px 14px;background:var(--accent-lighter);border:1.5px solid var(--accent-light);border-radius:var(--radius);display:flex;align-items:center;justify-content:center}
.age-display.empty{color:var(--text3);background:var(--surface2);border-color:var(--border);font-size:15px;font-weight:400;font-family:'Lora',serif}

/* ── SUBLOCATION SECTION LABELS ── */
.subloc-type-section{margin-top:28px;padding-top:20px;border-top:1px solid var(--border)}
.subloc-type-section:first-child{border-top:none;padding-top:0;margin-top:0}
.subloc-type-hdr{font-family:'Playfair Display',serif;font-size:18px;color:var(--text2);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.subloc-type-hdr .count{font-size:14px;background:var(--bg3);color:var(--text3);padding:2px 10px;border-radius:20px;font-family:'Lora',serif;font-weight:400}

/* ── WORLD PICKER SCREEN ── */
.world-picker{position:fixed;inset:0;background:linear-gradient(160deg,#f0ebe0 0%,#e8e0d0 40%,#ddd5c0 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1000;padding:40px}
.world-picker-inner{width:100%;max-width:700px;display:flex;flex-direction:column;gap:28px}
.wp-title{font-family:'Playfair Display',serif;font-size:52px;font-weight:700;color:var(--accent);text-align:center;text-shadow:0 2px 8px rgba(255,255,255,.5)}
.wp-subtitle{font-size:18px;color:var(--text2);text-align:center;font-style:italic;margin-top:-16px}
.wp-section-label{font-family:'Playfair Display',serif;font-size:14px;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);margin-bottom:10px}
.wp-worlds{display:flex;flex-direction:column;gap:10px;max-height:340px;overflow-y:auto}
.wp-world-card{background:rgba(255,255,255,.85);border:2px solid var(--border);border-radius:var(--radius-lg);padding:16px 20px;cursor:pointer;display:flex;align-items:center;gap:16px;transition:all .15s;backdrop-filter:blur(4px)}
.wp-world-card:hover{border-color:var(--accent);background:rgba(255,255,255,.98);box-shadow:var(--shadow);transform:translateY(-1px)}
.wp-world-icon{font-size:32px;flex-shrink:0}
.wp-world-info{flex:1;min-width:0}
.wp-world-name{font-family:'Playfair Display',serif;font-size:20px;font-weight:600;color:var(--text)}
.wp-world-meta{font-size:14px;color:var(--text3);margin-top:2px}
.wp-world-delete{padding:6px 10px;font-size:13px;color:var(--text3);background:transparent;border:1px solid transparent;border-radius:var(--radius);cursor:pointer;transition:all .15s;flex-shrink:0}
.wp-world-delete:hover{color:var(--red);border-color:#e8b0b0;background:var(--red-light)}
.wp-actions{display:flex;flex-direction:column;gap:10px}
.wp-divider{display:flex;align-items:center;gap:12px;color:var(--text3);font-size:14px}
.wp-divider::before,.wp-divider::after{content:'';flex:1;height:1px;background:var(--border2)}
.wp-folder-btn{display:flex;align-items:center;gap:12px;padding:16px 20px;background:rgba(255,255,255,.7);border:2px dashed var(--border2);border-radius:var(--radius-lg);cursor:pointer;transition:all .2s;font-family:'Lora',serif;font-size:16px;color:var(--text2)}
.wp-folder-btn:hover{border-color:var(--accent);background:rgba(255,255,255,.95);color:var(--accent)}
.wp-folder-icon{font-size:28px;flex-shrink:0}
.wp-no-worlds{text-align:center;padding:24px;color:var(--text3);font-style:italic;font-size:16px;background:rgba(255,255,255,.5);border-radius:var(--radius);border:1px dashed var(--border2)}

/* ── SAVE STATUS INDICATOR ── */
.save-status{display:flex;align-items:center;gap:8px;font-family:'Lora',serif;font-size:13px;padding:5px 12px;border-radius:20px;transition:all .3s;cursor:default;user-select:none;white-space:nowrap}
.save-status.saved{background:var(--green-light);color:var(--green);border:1px solid #a0d8b0}
.save-status.unsaved{background:#fffbeb;color:#92660a;border:1px solid #f0d88a;cursor:pointer}

// HELPERS
// ═══════════════════════════════════════════════════════════
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function singularize(s){ return s.endsWith('ies')?s.slice(0,-3)+'y':s.replace(/s$/,''); }
function getEntry(catId, idOrName) {
  if (!idOrName) return null;
  const list = world.entries[catId]||[];
  return list.find(e=>e.id===idOrName) || list.find(e=>e.name===idOrName) || null;
}
function entryById(id) {
  for (const cat of CATS) {
    const e = (world.entries[cat.id]||[]).find(e=>e.id===id);
    if (e) return {entry:e, catId:cat.id};
  }
  return null;
}
function calcAge(entry) {
  const birth=parseInt(entry.birthYear);
  if(isNaN(birth)) return null;
  const death=parseInt(entry.deathYear);
  const cur=parseInt(world.currentYear);
  if(!isNaN(death)) return (death-birth)+' yrs (†)';
  if(!isNaN(cur)&&cur>=birth) return (cur-birth)+' yrs';
  return null;
}
function parseMulti(val) {
  if (!val) return [];
  try { const p=JSON.parse(val); if(Array.isArray(p)) return p; } catch(_) {}
  return val.split(',').map(s=>s.trim()).filter(Boolean);
}
function multiToStr(arr) { return JSON.stringify(arr); }

// ═══════════════════════════════════════════════════════════
// AUTOCOMPLETE ENGINE
// ═══════════════════════════════════════════════════════════
function getACSuggestions(acSrc, query) {
  if (!acSrc || !query) return [];
  const sources = acSrc.split(',');
  const q = query.toLowerCase();
  const results = [];
  sources.forEach(src => {
    const cat = CATS.find(c=>c.id===src.trim());
    if (!cat) return;
    (world.entries[src.trim()]||[]).forEach(e => {
      if (e.name.toLowerCase().includes(q)) results.push({entry:e, catId:src.trim(), cat});
    });
  });
  return results.sort((a,b)=>a.entry.name.localeCompare(b.entry.name)).slice(0,10);
}

function makeACField(f, currentVal, fieldId) {
  const wrap = document.createElement('div'); wrap.className='ac-wrap';
  const input = document.createElement('input');
  input.className='form-input'; input.type='text';
  input.id=fieldId; input.placeholder=f.ph||'';
  input.value=currentVal||'';
  if (f.defaultVal && !currentVal) input.value = f.defaultVal;

  const dropdown = document.createElement('div'); dropdown.className='ac-dropdown'; dropdown.id=fieldId+'_drop';

  function showSuggestions(q) {
    const suggestions = getACSuggestions(f.acSrc, q);
    dropdown.innerHTML='';
    if (!suggestions.length && q) {
      dropdown.innerHTML=`<div class="ac-none">No matches found</div>`;
    }
    suggestions.forEach(({entry, cat}) => {
      const item = document.createElement('div'); item.className='ac-item';
      const imgDiv = document.createElement('div'); imgDiv.className='ac-item-img';
      if(entry.image){const i=document.createElement('img');i.src=entry.image;imgDiv.appendChild(i);}
      else imgDiv.textContent=cat.icon;
      const textDiv = document.createElement('div'); textDiv.className='ac-item-text';
      const sub = entry.factionType||entry.type||entry.title||calcAge(entry)||'';
      textDiv.innerHTML=`<div class="ac-item-name">${esc(entry.name)}</div>${sub?`<div class="ac-item-sub">${esc(sub)}</div>`:''}`;
      item.appendChild(imgDiv); item.appendChild(textDiv);
      item.onmousedown=(e)=>{ e.preventDefault(); input.value=entry.name; dropdown.classList.remove('open'); };
      dropdown.appendChild(item);
    });
    if (suggestions.length || q) dropdown.classList.add('open');
    else dropdown.classList.remove('open');
  }

  input.addEventListener('input', ()=>showSuggestions(input.value));
  input.addEventListener('focus', ()=>{ if(input.value) showSuggestions(input.value); });
  input.addEventListener('blur', ()=>setTimeout(()=>dropdown.classList.remove('open'),150));
  input.addEventListener('keydown', e=>{
    const items=[...dropdown.querySelectorAll('.ac-item')];
    const hi=items.findIndex(i=>i.classList.contains('highlighted'));
    if(e.key==='ArrowDown'){e.preventDefault();const ni=Math.min(hi+1,items.length-1);items.forEach(i=>i.classList.remove('highlighted'));if(items[ni])items[ni].classList.add('highlighted');}
    if(e.key==='ArrowUp'){e.preventDefault();const ni=Math.max(hi-1,0);items.forEach(i=>i.classList.remove('highlighted'));if(items[ni])items[ni].classList.add('highlighted');}
    if(e.key==='Enter'&&hi>=0){e.preventDefault();input.value=items[hi].querySelector('.ac-item-name').textContent;dropdown.classList.remove('open');}
    if(e.key==='Escape')dropdown.classList.remove('open');
  });

  wrap.appendChild(input); wrap.appendChild(dropdown);
  return wrap;
}

function makeMultiACField(f, currentVals, fieldId) {
  const values = [...(currentVals||[])];
  const wrap = document.createElement('div'); wrap.className='multi-field';
  wrap.id=fieldId+'_multiWrap';

  const tagsDiv = document.createElement('div'); tagsDiv.className='multi-tags'; tagsDiv.id=fieldId+'_tags';
  const inputWrap = document.createElement('div'); inputWrap.className='multi-input-wrap ac-wrap';
  const input = document.createElement('input'); input.className='multi-input'; input.type='text'; input.placeholder=f.ph||''; input.id=fieldId;
  const dropdown = document.createElement('div'); dropdown.className='ac-dropdown'; dropdown.id=fieldId+'_drop';
  inputWrap.appendChild(input); inputWrap.appendChild(dropdown);
  wrap.appendChild(tagsDiv); wrap.appendChild(inputWrap);
  // hidden input stores JSON
  const hidden = document.createElement('input'); hidden.type='hidden'; hidden.id=fieldId+'_val'; hidden.value=multiToStr(values);
  wrap.appendChild(hidden);

  function renderTags() {
    tagsDiv.innerHTML='';
    values.forEach((v,i)=>{
      const tag=document.createElement('div');tag.className='multi-tag';
      tag.innerHTML=`${esc(v)}<span class="mt-remove" data-i="${i}">×</span>`;
      tag.querySelector('.mt-remove').onclick=()=>{ values.splice(i,1); hidden.value=multiToStr(values); renderTags(); };
      tagsDiv.appendChild(tag);
    });
  }

  function showSuggestions(q) {
    const suggestions = getACSuggestions(f.acSrc, q).filter(s=>!values.includes(s.entry.name));
    dropdown.innerHTML='';
    if(!suggestions.length&&q){dropdown.innerHTML=`<div class="ac-none">No matches</div>`;}
    suggestions.forEach(({entry,cat})=>{
      const item=document.createElement('div');item.className='ac-item';
      const imgDiv=document.createElement('div');imgDiv.className='ac-item-img';
      if(entry.image){const i=document.createElement('img');i.src=entry.image;imgDiv.appendChild(i);}else imgDiv.textContent=cat.icon;
      const textDiv=document.createElement('div');textDiv.className='ac-item-text';
      textDiv.innerHTML=`<div class="ac-item-name">${esc(entry.name)}</div>`;
      item.appendChild(imgDiv);item.appendChild(textDiv);
      item.onmousedown=e=>{e.preventDefault();values.push(entry.name);hidden.value=multiToStr(values);renderTags();input.value='';dropdown.classList.remove('open');};
      dropdown.appendChild(item);
    });
    if(suggestions.length||q)dropdown.classList.add('open');else dropdown.classList.remove('open');
  }

  input.addEventListener('input',()=>showSuggestions(input.value));
  input.addEventListener('focus',()=>{if(input.value)showSuggestions(input.value);});
  input.addEventListener('blur',()=>setTimeout(()=>dropdown.classList.remove('open'),150));
  input.addEventListener('keydown',e=>{
    if(e.key==='Enter'&&input.value.trim()){
      e.preventDefault();
      const items=[...dropdown.querySelectorAll('.ac-item')];
      const hi=items.findIndex(i=>i.classList.contains('highlighted'));
      const name=hi>=0?items[hi].querySelector('.ac-item-name').textContent:input.value.trim();
      if(name&&!values.includes(name)){values.push(name);hidden.value=multiToStr(values);renderTags();input.value='';dropdown.classList.remove('open');}
    }
    const items=[...dropdown.querySelectorAll('.ac-item')];
    const hi=items.findIndex(i=>i.classList.contains('highlighted'));
    if(e.key==='ArrowDown'){e.preventDefault();const ni=Math.min(hi+1,items.length-1);items.forEach(i=>i.classList.remove('highlighted'));if(items[ni])items[ni].classList.add('highlighted');}
    if(e.key==='ArrowUp'){e.preventDefault();const ni=Math.max(hi-1,0);items.forEach(i=>i.classList.remove('highlighted'));if(items[ni])items[ni].classList.add('highlighted');}
  });

  renderTags();
  return wrap;
}

function renderSidebar(filter) {
  if(filter===undefined) filter=document.getElementById('sbSearch')?.value||'';
  const sb=document.getElementById('sidebar'); sb.innerHTML=`<div class="sb-search"><input type="text" id="sbSearch" placeholder="Search entries…" value="${esc(filter)}" oninput="renderSidebar(this.value)"></div>`;
  const fl=filter.toLowerCase();
  CATS.forEach(cat=>{
    const entries=world.entries[cat.id]||[];
    const filtered=fl?entries.filter(e=>e.name.toLowerCase().includes(fl)):entries;
    const open=expandedCats.has(cat.id);
    const isActive=currentView?.type==='cat'&&currentView?.catId===cat.id;
    const sec=document.createElement('div');sec.className='sb-section';
    const hdr=document.createElement('div');hdr.className='sb-cat-hdr';
    if(isActive)hdr.style.background='var(--accent-lighter)';
    hdr.onclick=()=>{showCatLanding(cat.id);open?expandedCats.delete(cat.id):expandedCats.add(cat.id);renderSidebar(filter);};
    hdr.innerHTML=`<div class="sb-cat-label"><span class="ci">${cat.icon}</span>${cat.label}</div>${entries.length?`<span class="sb-cat-count">${entries.length}</span>`:''}<span class="sb-cat-arrow">${open?'▲':'▼'}</span>`;
    sec.appendChild(hdr);
    if(open){
      if(cat.id==='locations')buildLocSB(sec,filtered,0,'',fl);
      else if(cat.id==='factions')buildFactSB(sec,filtered,fl);
      else if(cat.id==='characters')buildCharSB(sec,filtered,fl);
      else if(cat.id==='history')buildHistorySB(sec,filtered,fl);
      else{
        if(!filtered.length){const em=document.createElement('div');em.className='sb-empty';em.textContent=fl?'No matches':'No entries yet';sec.appendChild(em);}
        filtered.forEach(e=>sec.appendChild(makeTR(cat.id,e,0)));
      }
      const nb=document.createElement('div');nb.className='sb-new';nb.onclick=()=>newEntry(cat.id);
      nb.innerHTML=`<div class="plus">+</div> New ${singularize(cat.label)}`;
      sec.appendChild(nb);
    }
    sb.appendChild(sec);
  });
}
function buildLocSB(container,all,depth,parentId,filter){
  const kids=all.filter(e=>(e.locatedIn||'')===(parentId||''));
  if(depth===0&&!kids.length){const em=document.createElement('div');em.className='sb-empty';em.textContent=filter?'No matches':'No locations yet';container.appendChild(em);}
  kids.forEach(e=>{

    const row=document.createElement('div');row.style.paddingLeft=(16+depth*18)+'px';
    row.className='tree-row'+(currentView?.entryId===e.id?' active':'');
    row.onclick=()=>viewEntry('locations',e.id);
    const exp=document.createElement('div');exp.className='tr-exp'+(isOpen?' open':'');exp.style.visibility=hasK?'visible':'hidden';exp.textContent='▶';
    exp.onclick=ev=>{ev.stopPropagation();isOpen?expandedLocs.delete(e.id):expandedLocs.add(e.id);renderSidebar();};

    container.appendChild(row);
    if(hasK&&isOpen)buildLocSB(container,all,depth+1,e.id,filter);
  });
}
function buildFactSB(container, all, filter) {
  const FACTION_TYPES = ['Criminal','Empire','Great House','Guild','Independent','Institution','Military','Minor House','Order','Religion'];
  const byType = {};
  FACTION_TYPES.forEach(t => byType[t] = []);
  all.forEach(e => {
    const t = e.factionType || 'Other';
    if (!byType[t]) byType[t] = [];
    byType[t].push(e);
  });
  const usedTypes = FACTION_TYPES.filter(t => byType[t] && byType[t].length > 0);
  if (!usedTypes.length) {
    const em = document.createElement('div'); em.className = 'sb-empty';
    em.textContent = filter ? 'No matches' : 'No factions yet'; container.appendChild(em); return;
  }
  usedTypes.forEach(type => {
    const typeEntries = byType[type].sort((a,b) => a.name.localeCompare(b.name));
    const isOpen = expandedFactionTypes.has(type);
    const typeHdr = document.createElement('div'); typeHdr.className = 'sb-type-hdr';
    typeHdr.onclick = () => {
      if (isOpen) expandedFactionTypes.delete(type); else expandedFactionTypes.add(type);
      renderSidebar();
    };
    typeHdr.innerHTML = `<div class="sb-type-label">${type} <span style="font-size:11px;color:var(--text3);font-weight:400">${typeEntries.length}</span></div><span class="sb-type-arrow">${isOpen ? '▲' : '▼'}</span>`;
    container.appendChild(typeHdr);
    if (isOpen) {
      typeEntries.forEach(e => {
        const row = document.createElement('div');
        row.className = 'sb-type-entry' + (currentView?.entryId === e.id ? ' active' : '');
        row.onclick = () => viewEntry('factions', e.id);
        const img = document.createElement('div'); img.className = 'ste-img';
        if (e.image) { const i = document.createElement('img'); i.src = e.image; img.appendChild(i); }
        else img.textContent = '⚜';
        const nm = document.createElement('div'); nm.className = 'ste-name'; nm.textContent = e.name;
        row.appendChild(img); row.appendChild(nm); container.appendChild(row);
      });
    }
  });
}
function buildHistorySB(container, all, filter) {
  if (!all.length) {
    const em = document.createElement('div'); em.className = 'sb-empty';
    em.textContent = filter ? 'No matches' : 'No history yet'; container.appendChild(em); return;
  }
  const HISTORY_TYPES = ['Conflict','Discovery','Catastrophe','Political','Religious','Magical','Economic','Other'];
  const byType = {}; const unknown = [];
  all.forEach(e => {
    const t = e.type || '';
    // Normalise 'War' -> 'Conflict' for display
    const display = (t.toLowerCase() === 'war') ? 'Conflict' : (t || 'Other');
    if (!byType[display]) byType[display] = [];
    byType[display].push(e);
  });
  const typeOrder = HISTORY_TYPES.filter(t => byType[t] && byType[t].length > 0);
  // Any types not in the predefined list
  Object.keys(byType).filter(t => !HISTORY_TYPES.includes(t)).forEach(t => typeOrder.push(t));

  if (!typeOrder.length) {
    const em = document.createElement('div'); em.className = 'sb-empty';
    em.textContent = filter ? 'No matches' : 'No history yet'; container.appendChild(em); return;
  }

  const typeColors = {
    'Conflict':'#c04040','Discovery':'#3a7a50','Catastrophe':'#8a3060',
    'Political':'#3a5a8a','Religious':'#7c5c38','Magical':'#5a3e78',
    'Economic':'#7a7020','Other':'var(--text3)'
  };

  typeOrder.forEach(type => {
    const typeEntries = byType[type].sort((a,b) => (parseInt(a.yearStart)||9999)-(parseInt(b.yearStart)||9999));
    const isOpen = expandedHistoryTypes.has(type);
    const hasActive = typeEntries.some(e => currentView?.entryId === e.id);
    if (hasActive) expandedHistoryTypes.add(type);
    const open = expandedHistoryTypes.has(type);
    const hdr = document.createElement('div'); hdr.className = 'sb-type-hdr';
    const dotColor = typeColors[type] || 'var(--text3)';
    hdr.onclick = () => { if (open) expandedHistoryTypes.delete(type); else expandedHistoryTypes.add(type); renderSidebar(); };
    hdr.innerHTML = `<div class="sb-type-label" style="font-size:12px;gap:6px"><span style="width:9px;height:9px;border-radius:50%;background:${dotColor};display:inline-block;flex-shrink:0"></span>${esc(type)} <span style="font-size:11px;color:var(--text3);font-weight:400">${typeEntries.length}</span></div><span class="sb-type-arrow">${open ? '▲' : '▼'}</span>`;
    container.appendChild(hdr);
    if (open) {
      typeEntries.forEach(e => {
        const row = document.createElement('div'); row.className = 'sb-type-entry' + (currentView?.entryId === e.id ? ' active' : '');
        row.style.paddingLeft = '36px';
        row.onclick = () => viewEntry('history', e.id);
        const yr = document.createElement('div');
        yr.style.cssText = 'font-size:11px;color:var(--text3);min-width:36px;flex-shrink:0;font-family:\'Playfair Display\',serif';
        yr.textContent = e.yearStart || e.yearEnd || '';
        const nm = document.createElement('div'); nm.className = 'ste-name'; nm.style.fontSize = '14px'; nm.textContent = e.name;
        row.appendChild(yr); row.appendChild(nm); container.appendChild(row);
      });
    }
  });
}
function buildCharSB(container, all, filter) {
  if (!all.length) {
    const em = document.createElement('div'); em.className = 'sb-empty';
    em.textContent = filter ? 'No matches' : 'No characters yet'; container.appendChild(em); return;
  }
  // Group by surname (last word of name)
  const bySurname = {}; const noSurname = [];
  all.forEach(e => {
    const parts = e.name.trim().split(/\s+/);
    const sn = parts.length > 1 ? parts[parts.length - 1] : null;
    if (sn) { if (!bySurname[sn]) bySurname[sn] = []; bySurname[sn].push(e); }
    else noSurname.push(e);
  });
  // Render surname groups sorted alphabetically
  Object.keys(bySurname).sort().forEach(sn => {
    const groupEntries = bySurname[sn];
    // Auto-expand if any member is active
    const hasActive = groupEntries.some(e => currentView?.entryId === e.id);
    if (hasActive) expandedSurnames.add(sn);
    const open = expandedSurnames.has(sn);
    const hdr = document.createElement('div'); hdr.className = 'sb-type-hdr';
    hdr.onclick = () => { if (open) expandedSurnames.delete(sn); else expandedSurnames.add(sn); renderSidebar(); };
    hdr.innerHTML = `<div class="sb-type-label" style="font-size:12px">⚔ House ${esc(sn)} <span style="font-size:11px;color:var(--text3);font-weight:400">${groupEntries.length}</span></div><span class="sb-type-arrow">${open ? '▲' : '▼'}</span>`;
    container.appendChild(hdr);
    if (open) {
      groupEntries.sort((a,b) => (parseInt(a.birthYear)||9999)-(parseInt(b.birthYear)||9999)).forEach(e => {
        const row = document.createElement('div'); row.className = 'sb-type-entry' + (currentView?.entryId === e.id ? ' active' : '');
        row.style.paddingLeft = '36px';
        row.onclick = () => viewEntry('characters', e.id);
        const statusColor = e.status==='Alive' ? '#3a7a50' : e.status==='Deceased' ? '#7a1a2a' : e.status==='Missing' ? '#c8842a' : '#6040a0';
        const dot = document.createElement('div');
        dot.style.cssText = `width:11px;height:11px;border-radius:50%;flex-shrink:0;margin-top:3px;background:${statusColor};box-shadow:0 0 0 2px rgba(0,0,0,0.08)`;
        const nm = document.createElement('div'); nm.className = 'ste-name'; nm.textContent = e.name;
        row.appendChild(dot); row.appendChild(nm); container.appendChild(row);
      });
    }
  });
  // Characters without a clear surname
  noSurname.forEach(e => container.appendChild(makeTR('characters', e, 0)));
}
function makeTR(catId,entry,depth){
  const row=document.createElement('div');row.style.paddingLeft=(16+depth*18)+'px';
  row.className='tree-row'+(currentView?.entryId===entry.id?' active':'');
  row.onclick=()=>viewEntry(catId,entry.id);
  const exp=document.createElement('div');exp.className='tr-exp';exp.style.visibility='hidden';exp.textContent='▶';
  const nm=document.createElement('div');nm.className='tr-name';nm.textContent=entry.name;
  row.appendChild(exp);row.appendChild(nm);return row;
}

function newHistoryEntry(type) {

function showCatLanding(catId){
  const cat=CATS.find(c=>c.id===catId);if(!cat)return;
  currentView={type:'cat',catId};renderSidebar();
  const area=document.getElementById('contentArea');area.innerHTML='';
  const wrap=document.createElement('div');wrap.className='cat-landing';
  const hdr=document.createElement('div');hdr.className='cat-landing-hdr';
  if (catId === 'history') {
    hdr.innerHTML=`<span style="font-size:36px">${cat.icon}</span><h1>${cat.label}</h1>
      <div style="display:flex;gap:8px">
        <button class="btn btn-primary" onclick="newHistoryEntry('Conflict')">⚔ New Conflict</button>
        <button class="btn btn-secondary" onclick="newHistoryEntry('Event')">📅 New Event</button>
      </div>`;
  } else {
    hdr.innerHTML=`<span style="font-size:36px">${cat.icon}</span><h1>${cat.label}</h1><button class="btn btn-primary" onclick="newEntry('${catId}')">+ New ${singularize(cat.label)}</button>`;
  }

  const entries=[...(world.entries[catId]||[])].sort((a,b)=>a.name.localeCompare(b.name));

function renderCharLanding(wrap, entries) {
  if (!entries.length) { wrap.innerHTML += '<p style="color:var(--text3);font-style:italic;font-size:17px">No characters yet.</p>'; return; }
  // Group by affiliation; unaffiliated go last
  const byFaction = {}; const unaffiliated = [];
  entries.forEach(e => {
    const f = (e.affiliation || '').trim();
    if (f) { if (!byFaction[f]) byFaction[f] = []; byFaction[f].push(e); }
    else unaffiliated.push(e);
  });
  const factionNames = Object.keys(byFaction).sort();

  function makeCharGrid(charList) {
    const grid = document.createElement('div'); grid.className = 'alpha-grid'; grid.style.marginBottom = '8px';
    charList.forEach(e => {
      const card = document.createElement('div'); card.className = 'alpha-card'; card.onclick = () => viewEntry('characters', e.id);
      const img = document.createElement('div'); img.className = 'alpha-card-img';
      if (e.image) { const i = document.createElement('img'); i.src = e.image; i.style = 'width:100%;height:100%;object-fit:cover;border-radius:6px'; img.appendChild(i); }
      else img.textContent = '👤';
      const age = calcAge(e);
      const statusColor = e.status==='Alive' ? '#3a7a50' : e.status==='Deceased' ? '#7a1a2a' : e.status==='Missing' ? '#c8842a' : '#6040a0';
      const info = document.createElement('div');
      info.innerHTML = `<div class="alpha-card-name">${esc(e.name)}</div>
        <div class="alpha-card-sub">${esc(e.title||'')}${age?' · '+age:''}</div>
        <div style="margin-top:4px"><span style="display:inline-block;width:9px;height:9px;border-radius:50%;background:${statusColor};margin-right:5px;vertical-align:middle"></span><span style="font-size:12px;color:var(--text3)">${esc(e.status||'')}</span></div>`;
      card.appendChild(img); card.appendChild(info); grid.appendChild(card);
    });
    return grid;
  }

  factionNames.forEach(fname => {
    const sec = document.createElement('div'); sec.style.cssText = 'margin-bottom:40px';
    const fHdr = document.createElement('div');
    fHdr.style.cssText = 'display:flex;align-items:center;gap:12px;margin-bottom:16px;padding-bottom:10px;border-bottom:2px solid var(--border)';
    const factionEntry = (world.entries.factions||[]).find(f => f.name === fname);
    const fIcon = document.createElement('span'); fIcon.style.fontSize = '24px'; fIcon.textContent = '⚜';
    const fTitle = document.createElement('h2');
    fTitle.style.cssText = "font-family:'Playfair Display',serif;font-size:22px;font-weight:600;color:var(--text);flex:1;cursor:pointer";

    count.textContent = byFaction[fname].length;
    fHdr.appendChild(fIcon); fHdr.appendChild(fTitle); fHdr.appendChild(count);
    sec.appendChild(fHdr);
    sec.appendChild(makeCharGrid(byFaction[fname]));
    wrap.appendChild(sec);
  });

  if (unaffiliated.length) {
    const sec = document.createElement('div'); sec.style.cssText = 'margin-bottom:40px';
    const uHdr = document.createElement('div');
    uHdr.style.cssText = 'display:flex;align-items:center;gap:12px;margin-bottom:16px;padding-bottom:10px;border-bottom:2px solid var(--border)';
    uHdr.innerHTML = `<span style="font-size:24px">👤</span><h2 style="font-family:'Playfair Display',serif;font-size:22px;font-weight:600;color:var(--text);flex:1">Unaffiliated</h2><span style="font-size:14px;background:var(--bg3);color:var(--text3);padding:2px 10px;border-radius:20px">${unaffiliated.length}</span>`;
    sec.appendChild(uHdr);
    sec.appendChild(makeCharGrid(unaffiliated));
    wrap.appendChild(sec);
  }
}
function renderAlphaLanding(wrap,entries,catId){

function renderFactLanding(wrap, entries) {

function renderLocLanding(wrap){

function renderHistoryTimeline(wrap) {
  const events = world.entries.history || [];
  if (!events.length) { wrap.innerHTML += '<p style="color:var(--text3);font-style:italic;font-size:17px">No history entries yet.</p>'; return; }
  const cy = parseInt(world.currentYear) || null;
  const sorted = [...events].filter(e => parseInt(e.yearStart) || parseInt(e.yearEnd))
    .sort((a,b) => (parseInt(a.yearStart)||parseInt(a.yearEnd)||0) - (parseInt(b.yearStart)||parseInt(b.yearEnd)||0));
  if (!sorted.length) { renderAlphaLanding(wrap, [...events].sort((a,b)=>a.name.localeCompare(b.name)), 'history'); return; }

  function dotClass(type) {
    const t = (type||'').toLowerCase();
    if (t === 'conflict' || t === 'war') return 'conflict';
    if (t === 'political') return 'political';
    if (t === 'religious') return 'religious';
    if (t === 'catastrophe') return 'catastrophe';
    if (t === 'magical') return 'magical';
    if (t === 'discovery') return 'discovery';
    if (t === 'economic') return 'economic';
    return 'default';
  }
  function typeBadgeStyle(type) {
    const t = (type||'').toLowerCase();
    if (t === 'conflict' || t === 'war') return 'background:#fde8e8;color:#a04040';
    if (t === 'political') return 'background:#e8eef8;color:#3a5a8a';
    if (t === 'religious') return 'background:#fdf0e0;color:#9a6020';
    if (t === 'catastrophe') return 'background:#fde8f4;color:#8a3060';
    if (t === 'magical') return 'background:#f2eeff;color:#5a3e78';
    if (t === 'discovery') return 'background:#e8f4ec;color:#3a7a50';
    if (t === 'economic') return 'background:#f8f8e0;color:#7a7020';
    return 'background:var(--bg3);color:var(--text3)';
  }

  const vtlWrap = document.createElement('div'); vtlWrap.className = 'vtl-wrap';
  const lineContainer = document.createElement('div'); lineContainer.className = 'vtl-line-container';
  const spine = document.createElement('div'); spine.className = 'vtl-spine';
  lineContainer.appendChild(spine);

  let sideIdx = 0;
  sorted.forEach((e, i) => {
    // "Now" marker
    if (cy && !lineContainer._nowInserted) {
      const eYear = parseInt(e.yearStart)||parseInt(e.yearEnd)||0;
      if (eYear > cy) {
        const nowRow = document.createElement('div'); nowRow.className = 'vtl-now';
        nowRow.innerHTML = '<div class="vtl-now-line"></div><div class="vtl-now-label">▶ Present — Year ' + cy + '</div><div class="vtl-now-line"></div>';
        lineContainer.appendChild(nowRow);
        lineContainer._nowInserted = true;
      }
    }

    const side = sideIdx % 2 === 0 ? 'right' : 'left';
    sideIdx++;
    const row = document.createElement('div'); row.className = `vtl-event ${side}`;

    const dotCol = document.createElement('div'); dotCol.className = 'vtl-dot-col';
    const dot = document.createElement('div'); dot.className = `vtl-dot ${dotClass(e.type)}`;
    dot.title = e.name; dot.onclick = () => viewEntry('history', e.id);
    dotCol.appendChild(dot);

    const contentDiv = document.createElement('div'); contentDiv.className = 'vtl-content-wrap';
    contentDiv.onclick = () => viewEntry('history', e.id);

    const yearStr = e.yearStart
      ? (e.yearEnd && e.yearEnd !== e.yearStart ? `${e.yearStart}–${e.yearEnd}` : e.yearStart)
      : (e.yearEnd || '?');

    let html = `<div class="vtl-year">${esc(yearStr)}</div>`;
    if (e.type) html += `<div class="vtl-type-badge" style="${typeBadgeStyle(e.type)}">${esc(e.type)}</div>`;
    html += `<div class="vtl-name">${esc(e.name)}</div>`;
    if (e.description) html += `<div class="vtl-desc">${esc(e.description.length > 160 ? e.description.slice(0,160)+'…' : e.description)}</div>`;
    contentDiv.innerHTML = html;

    const spacer = document.createElement('div'); spacer.className = 'vtl-spacer';
    if (side === 'right') {
      row.appendChild(spacer); row.appendChild(dotCol); row.appendChild(contentDiv);
    } else {
      row.appendChild(contentDiv); row.appendChild(dotCol); row.appendChild(spacer);
    }
    lineContainer.appendChild(row);
  });

  if (cy && !lineContainer._nowInserted) {
    const nowRow = document.createElement('div'); nowRow.className = 'vtl-now';
    nowRow.innerHTML = '<div class="vtl-now-line"></div><div class="vtl-now-label">▶ Present — Year ' + cy + '</div><div class="vtl-now-line"></div>';
    lineContainer.appendChild(nowRow);
  }

  vtlWrap.appendChild(lineContainer);
  wrap.appendChild(vtlWrap);
}
